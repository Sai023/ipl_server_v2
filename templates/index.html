<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#07111F" />
  <link rel="manifest" href="/manifest.json" />
  <title>IPL Fantasy 2026</title>
  <link rel="stylesheet" href="/static/style.css?v=1.0">
</head>
<body>
<div id="app-loading"><div class="logo">🏏</div><h1>IPL Fantasy 2026</h1><div class="spinner"></div><p>Loading your league…</p></div>
<div id="error-banner" role="alert"></div>
<div id="app"></div>
<script>
"use strict";
var BUDGET_TOTAL=100.0,XI_SIZE=11;

// ─── GLOBAL STATE ─────────────────────────────────────────────────────────────
var _state=null,_leaderboard=null,_players=null,_username=null;
var _activeTab="team",_currentWeek=1,_historyData=null,_historyViewWk=null;
var _nwDraft={team:[],cap:null,vc:null};
var _pickerSearch="",_pickerRole="All",_pickerTeam="All Teams";
var _ptsData=null,_ptsLoading=false;
var _adminMatches=null,_adminFilter="all";
var members={},matches=[];
var $app=document.getElementById("app"),$loading=document.getElementById("app-loading"),$errorBanner=document.getElementById("error-banner");

function _buildCatalogue(){
  var map={};
  if(_players&&_players.players)_players.players.forEach(function(p){map[p.id]=p;map[p.name.toLowerCase()]=p;});
  return map;
}
function _allPlayers(){
  var seen={},out=[];
  var src=(_players&&_players.players&&_players.players.length>0)?_players.players:[];
  src.forEach(function(p){var k=p.name.toLowerCase();if(!seen[k]){seen[k]=true;out.push(p);}});
  out.sort(function(a,b){return a.name<b.name?-1:1;});
  return out;
}
function resolvePlayer(idOrName){
  if(!idOrName)return{name:"",role:"",team:"",price:0};
  var cat=_buildCatalogue();
  var p=cat[idOrName]||cat[String(idOrName).toLowerCase()];
  if(p)return p;
  var key=String(idOrName).toLowerCase(),all=_allPlayers();
  for(var i=0;i<all.length;i++){if(all[i].name&&all[i].name.toLowerCase().endsWith(key))return all[i];}
  return{name:String(idOrName),role:"",team:"",price:0};
}
function _teamCost(arr){var t=0;arr.forEach(function(id){var p=resolvePlayer(id);t+=(p.price||0);});return Math.round(t*10)/10;}
function _remaining(){return Math.round((BUDGET_TOTAL-_teamCost(_nwDraft.team))*10)/10;}
var LS_KEY="ipl_username";
function getSavedUsername(){try{return localStorage.getItem(LS_KEY)||null;}catch(e){return null;}}
function saveUsername(n){try{localStorage.setItem(LS_KEY,n);}catch(e){}}
function clearUsername(){try{localStorage.removeItem(LS_KEY);}catch(e){}}
function esc(s){return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");}
function escAttr(s){return String(s).replace(/\\/g,"\\\\").replace(/'/g,"\\'");}
function hideLoading(){if($loading&&!$loading.classList.contains("hidden")){$loading.classList.add("hidden");setTimeout(function(){if($loading)$loading.remove();},450);}}
function showErrorBanner(msg){if(!$errorBanner)return;$errorBanner.textContent="\u26a0\uFE0F  "+(msg||"Server error \u2014 retrying\u2026");$errorBanner.classList.add("visible");}
function hideErrorBanner(){if($errorBanner)$errorBanner.classList.remove("visible");}
function _avClass(team){
  if(!team)return"";
  switch(team.toLowerCase()){
    case"rcb":return"av-rcb";case"srh":return"av-srh";case"mi":return"av-mi";case"kkr":return"av-kkr";
    case"csk":return"av-csk";case"rr":return"av-rr";case"dc":return"av-dc";case"pbks":return"av-pbks";
    case"lsg":return"av-lsg";case"gt":return"av-gt";default:return"";
  }
}
function _roleBadge(role){
  if(!role)return"";
  var m={WK:"badge-wk",BAT:"badge-bat",AR:"badge-ar",BOWL:"badge-bowl"},cls=m[role]||"";
  return cls?'<span class="badge '+cls+'">'+esc(role)+'</span>':"";
}
function _initials(name){
  if(!name)return"?";
  var parts=name.split(" ");
  if(parts.length===1)return name.substring(0,2).toUpperCase();
  return(parts[0][0]+parts[parts.length-1][0]).toUpperCase();
}

// ─── SESSION ─────────────────────────────────────────────────────────────────
function login(name){
  if(!name)return false;
  var known=_state?Object.keys(_state.members||{}):[];
  if(known.length>0&&!_state.members[name])return false;
  _username=name;_activeTab="team";_historyData=null;_historyViewWk=null;
  _ptsData=null;_adminMatches=null;
  saveUsername(name);_loadHistory();
  if(_state)render(_state);
  return true;
}
function logout(){
  _username=null;clearUsername();_historyData=null;_historyViewWk=null;
  _nwDraft={team:[],cap:null,vc:null};_ptsData=null;_adminMatches=null;
  if(_state)render(_state);
}
function switchTab(tab){
  _activeTab=tab;
  if(tab==="points"&&!_ptsData&&_username)_loadPoints();
  if(tab==="admin")_loadAdminMatches();
  if(_state)render(_state);
}

// ─── HISTORY ────────────────────────────────────────────────────────────────
function _loadHistory(){
  if(!_username||!window.IplApi)return;
  window.IplApi.getHistory(_username).then(function(data){
    if(!data||!data.ok)return;
    _historyData=data;_currentWeek=data.current_week;
    var cur=_getCurrentWeekRow(data);
    if(cur){
      var nw=cur.next_week,tw=cur.this_week;
      if(nw&&nw.team&&nw.team.length>0)_nwDraft={team:nw.team.slice(),cap:nw.cap,vc:nw.vc};
      else if(tw&&tw.team&&tw.team.length>0)_nwDraft={team:tw.team.slice(),cap:tw.cap,vc:tw.vc};
    }
    if(_state)render(_state);
  }).catch(function(e){console.error("[IPL] history:",e);});
}

// ─── POINTS ──────────────────────────────────────────────────────────────────
function _loadPoints(){
  if(!_username||_ptsLoading)return;
  _ptsLoading=true;
  fetch("/api/player-points/"+encodeURIComponent(_username))
    .then(function(r){return r.ok?r.json():null;})
    .then(function(d){
      _ptsLoading=false;
      if(d&&d.ok){_ptsData=d;}
      if(_state&&_activeTab==="points")render(_state);
    }).catch(function(){_ptsLoading=false;});
}

// ─── ADMIN MATCHES ────────────────────────────────────────────────────────────
function _loadAdminMatches(){
  fetch("/api/matches-status")
    .then(function(r){return r.ok?r.json():null;})
    .then(function(d){
      if(d&&d.ok){_adminMatches=d.matches;}
      if(_state&&_activeTab==="admin")render(_state);
    }).catch(function(){});
}
function _adminSaveUrl(matchId,inputId,statusId){
  var inp=document.getElementById(inputId);
  var statusEl=document.getElementById(statusId);
  var url=inp?inp.value.trim():"";
  if(!url){if(statusEl){statusEl.textContent="Enter a URL first";statusEl.className="admin-save-status err";}return;}
  var btn=document.getElementById("btn-"+matchId);
  if(btn)btn.disabled=true;
  if(statusEl){statusEl.textContent="Saving\u2026";statusEl.className="admin-save-status";}
  fetch("/api/update-match-url",{
    method:"POST",headers:{"Content-Type":"application/json"},
    body:JSON.stringify({match_id:matchId,url:url})
  }).then(function(r){return r.json();})
  .then(function(d){
    if(btn)btn.disabled=false;
    if(d&&d.ok){
      if(statusEl){statusEl.textContent="\u2705 Saved! Scraping in background\u2026";statusEl.className="admin-save-status ok";}
      _adminMatches=null;
      setTimeout(function(){_loadAdminMatches();if(_state&&_activeTab==="admin")render(_state);},3000);
    } else {
      if(statusEl){statusEl.textContent="\u274c "+(d.error||"Error");statusEl.className="admin-save-status err";}
    }
  }).catch(function(){
    if(btn)btn.disabled=false;
    if(statusEl){statusEl.textContent="\u274c Network error";statusEl.className="admin-save-status err";}
  });
}

// ─── MUTATIONS ────────────────────────────────────────────────────────────────
function _getCurrentWeekRow(hd){
  var d=hd||_historyData;if(!d||!d.weeks)return null;
  for(var i=d.weeks.length-1;i>=0;i--){if(d.weeks[i].is_current)return d.weeks[i];}
  return d.weeks[d.weeks.length-1]||null;
}
function _getThisWeekData(){
  if(_state&&_username&&_state.members&&_state.members[_username]){
    var tw=_state.members[_username].this_week;
    if(tw&&tw.team&&tw.team.length>0)return tw;
  }
  var cur=_getCurrentWeekRow();
  if(cur&&cur.this_week&&cur.this_week.team&&cur.this_week.team.length>0)return cur.this_week;
  return null;
}
function _selectHistoryWeek(wkNo){_historyViewWk=(wkNo===_currentWeek)?null:wkNo;if(_state)render(_state);}
function _nwSetCap(id){_nwDraft.cap=(_nwDraft.cap===id)?null:id;_nwDraft.vc=(_nwDraft.vc===id)?null:_nwDraft.vc;if(_state)render(_state);}
function _nwSetVc(id){_nwDraft.vc=(_nwDraft.vc===id)?null:id;_nwDraft.cap=(_nwDraft.cap===id)?null:_nwDraft.cap;if(_state)render(_state);}
function _nwRemove(id){_nwDraft.team=_nwDraft.team.filter(function(x){return x!==id;});if(_nwDraft.cap===id)_nwDraft.cap=null;if(_nwDraft.vc===id)_nwDraft.vc=null;if(_state)render(_state);}
function _nwToggle(id){
  var idx=_nwDraft.team.indexOf(id);
  if(idx!==-1){_nwRemove(id);return;}
  if(_nwDraft.team.length>=XI_SIZE)return;
  var p=resolvePlayer(id),cost=_teamCost(_nwDraft.team)+(p.price||0);
  if(cost>BUDGET_TOTAL)return;
  _nwDraft.team.push(id);
  if(_state)render(_state);
}
function _nwSave(){
  if(!_username)return;
  if(_nwDraft.team.length!==XI_SIZE){alert("Select exactly 11 players first.");return;}
  var btn=document.getElementById("nw-save-btn"),msg=document.getElementById("nw-save-msg");
  if(btn){btn.disabled=true;btn.textContent="Saving\u2026";}
  if(msg){msg.textContent="";msg.className="save-status";}
  window.IplApi.saveNextWeek(_username,_nwDraft)
    .then(function(){
      if(btn){btn.disabled=false;btn.textContent="Save Draft";}
      if(msg){msg.textContent="\u2713 Saved!";msg.className="save-status ok";}
      window.dispatchEvent(new CustomEvent("ipl:saved"));
      setTimeout(function(){if(msg)msg.textContent="";},3000);
    }).catch(function(e){
      if(btn){btn.disabled=false;btn.textContent="Save Draft";}
      if(msg){msg.textContent="\u2717 "+(e.serverMessage||e.message);msg.className="save-status err";}
    });
}
function _pickerSetRole(r){_pickerRole=r;if(_state)render(_state);}
function _pickerSetTeam(t){_pickerTeam=t;if(_state)render(_state);}

function _refreshData(){
  var btn=document.getElementById("refresh-btn"),msg=document.getElementById("refresh-status");
  if(btn){btn.disabled=true;btn.innerHTML='<span class="spin">\u27F3</span> Refreshing\u2026';}
  if(msg){msg.textContent="";msg.className="refresh-status";}
  if(window.IplPolling)window.IplPolling.stop();
  var stP=fetch("/api/state",{headers:{"Accept":"application/json","Cache-Control":"no-cache"}}).then(function(r){return r.ok?r.json():null;}).catch(function(){return null;});
  var lbP=fetch("/api/leaderboard",{headers:{"Accept":"application/json"}}).then(function(r){return r.ok?r.json():null;}).catch(function(){return null;});
  var hP=(_username&&window.IplApi)?window.IplApi.getHistory(_username).catch(function(){return null;}):Promise.resolve(null);
  var pP=(_username)?fetch("/api/player-points/"+encodeURIComponent(_username)).then(function(r){return r.ok?r.json():null;}).catch(function(){return null;}):Promise.resolve(null);
  Promise.all([stP,lbP,hP,pP]).then(function(results){
    var state=results[0],lb=results[1],history=results[2],pts=results[3];
    var ts=new Date().toLocaleTimeString([],{hour:"2-digit",minute:"2-digit"});
    if(state){
      if(history&&history.ok){_historyData=history;_currentWeek=history.current_week;}
      if(lb){_leaderboard=window.normaliseLeaderboard?window.normaliseLeaderboard(lb):lb;}
      if(pts&&pts.ok)_ptsData=pts;
      render(state);
      var ba=document.getElementById("refresh-btn"),ma=document.getElementById("refresh-status");
      if(ma){ma.textContent="\u2713 Updated "+ts;ma.className="refresh-status ok";}
      if(ba){ba.disabled=false;ba.innerHTML="\u27F3 Refresh";}
    } else {
      var bb=document.getElementById("refresh-btn"),mb=document.getElementById("refresh-status");
      if(bb){bb.disabled=false;bb.innerHTML="\u27F3 Refresh";}
      if(mb){mb.textContent="\u2717 Could not reach server";mb.className="refresh-status err";}
    }
    if(window.IplPolling)window.IplPolling.start();
  });
}
function _simulateRollover(){
  var btn=document.getElementById("rollover-btn"),res=document.getElementById("rollover-result");
  if(btn){btn.disabled=true;btn.textContent="Running\u2026";}
  if(res)res.textContent="";
  window.IplApi.rollover(true).then(function(data){
    if(btn){btn.disabled=false;btn.textContent="\u25B6 Simulate Monday 2:00 PM Rollover";}
    if(res){
      if(data&&data.rolled){res.textContent="\u2713 Done! New week: W"+(data.new_week_no||"?");res.style.color="var(--teal)";}
      else{res.textContent="No-op: "+(data&&data.reason?data.reason:"already rolled");res.style.color="var(--muted)";}
    }
    _historyData=null;_nwDraft={team:[],cap:null,vc:null};_ptsData=null;
    window.dispatchEvent(new CustomEvent("ipl:saved"));_loadHistory();
  }).catch(function(e){
    if(btn){btn.disabled=false;btn.textContent="\u25B6 Simulate Monday 2:00 PM Rollover";}
    if(res){res.textContent="\u2717 Error: "+(e.serverMessage||e.message);res.style.color="#FF6B6B";}
  });
}

// ─── XI CARD BUILDERS ──────────────────────────────────────────────────────────
function _buildXiGrid(teamArr,capId,vcId){
  if(!teamArr||teamArr.length===0)return'<p class="empty">No XI recorded.</p>';
  var h='<div class="xi-grid">';
  teamArr.forEach(function(id){
    var p=resolvePlayer(id),nm=p.name||id,iC=(id===capId),iV=(id===vcId);
    var cls="xi-card"+(iC?" is-cap":iV?" is-vc":"");
    var avC=_avClass(p.team),sub=[p.role,p.team].filter(Boolean).join(" \u00B7 ");
    var bdg=iC?'<span class="badge badge-c">C</span>':iV?'<span class="badge badge-vc">VC</span>':'';
    h+='<div class="'+cls+'">'+'<div class="xi-avatar '+avC+'">'+esc(_initials(nm))+'</div>'+'<div class="xi-info"><div class="xi-name">'+esc(nm)+'</div>'+(sub?'<div class="xi-sub">'+esc(sub)+'</div>':'')+'</div>'+(bdg?'<div class="xi-badge-wrap">'+bdg+'</div>':'')+'</div>';
  });
  return h+'</div>';
}
function _buildNwSquad(){
  var team=_nwDraft.team,cap=_nwDraft.cap,vc=_nwDraft.vc;
  if(team.length===0)return'<p class="empty" style="margin-bottom:4px">No players selected. Pick from the list below.</p>';
  var h='<div class="xi-grid">';
  team.forEach(function(id){
    var p=resolvePlayer(id),nm=p.name||id,iC=(id===cap),iV=(id===vc);
    var cls="xi-card editable"+(iC?" is-cap":iV?" is-vc":"");
    var avC=_avClass(p.team),sub=[p.role,p.team].filter(Boolean).join(" \u00B7 ");
    h+='<div class="'+cls+'">'+'<div class="xi-avatar '+avC+'">'+esc(_initials(nm))+'</div>'+'<div class="xi-info"><div class="xi-name">'+esc(nm)+'</div>'+(sub?'<div class="xi-sub">'+esc(sub)+'</div>':'')+'</div>'+'<div class="xi-edit-row">'+'<button class="ecap-btn'+(iC?' on':'')+'" onclick="_nwSetCap(\''+escAttr(id)+'\')">C</button>'+'<button class="evc-btn'+(iV?' on':'')+'" onclick="_nwSetVc(\''+escAttr(id)+'\')">VC</button>'+'<button class="erem-btn" onclick="_nwRemove(\''+escAttr(id)+'\')">\xd7</button>'+'</div></div>';
  });
  return h+'</div>';
}
function _buildBudgetBar(){
  var spent=_teamCost(_nwDraft.team),rem=Math.round((BUDGET_TOTAL-spent)*10)/10;
  var pct=Math.min(100,(spent/BUDGET_TOTAL)*100),cls=rem<0?"over":rem<10?"warn":"ok";
  var fillBg=rem<0?"#FF6B6B":rem<10?"var(--gold)":"var(--teal)";
  return'<div class="budget-bar"><div><div class="budget-label">Budget</div><div class="budget-amount '+cls+'">'+(rem<0?'\u2212':'')+Math.abs(rem).toFixed(1)+' CR left</div></div><div class="budget-track"><div class="budget-fill" style="width:'+pct+'%;background:'+fillBg+'"></div></div><div style="font-size:11px;color:var(--muted);min-width:80px;text-align:right">'+spent.toFixed(1)+' / '+BUDGET_TOTAL.toFixed(1)+' CR</div></div>';
}
function _buildPicker(){
  var allP=_allPlayers(),teams=[],ts={};
  allP.forEach(function(p){if(p.team&&!ts[p.team]){ts[p.team]=true;teams.push(p.team);}});
  teams.sort();
  var ptsMap={};
  if(_ptsData&&_ptsData.players){
    _ptsData.players.forEach(function(pp){
      if(pp.id)ptsMap[pp.id]=pp.total_pts;
      if(pp.name)ptsMap[pp.name.toLowerCase()]=pp.total_pts;
    });
  }
  var q=_pickerSearch.toLowerCase().trim();
  var filtered=allP.filter(function(p){
    if(_pickerRole!=="All"&&p.role!==_pickerRole)return false;
    if(_pickerTeam!=="All Teams"&&p.team!==_pickerTeam)return false;
    if(q&&(p.name+" "+(p.team||"")).toLowerCase().indexOf(q)===-1)return false;
    return true;
  });
  var selSet={};_nwDraft.team.forEach(function(n){selSet[n]=true;});
  var xi_full=_nwDraft.team.length>=XI_SIZE,rem=_remaining();
  var lockMsg="";
  if(xi_full&&rem>=-0.001)lockMsg="\uD83D\uDD12 XI complete \u2014 tap any player below to swap";
  else if(rem<=0)lockMsg="\uD83D\uDCB8 Budget limit reached \u2014 remove a player to free up funds";
  var h='<div class="picker-shell"><div class="picker-toolbar"><div class="picker-search"><span style="color:var(--muted);font-size:13px">\uD83D\uDD0D</span><input id="picker-search-input" type="text" placeholder="Search by name or team\u2026" value="'+esc(_pickerSearch)+'" oninput="_pickerSearch=this.value;if(_state)render(_state)"></div><div class="picker-filters">';
  ["All","WK","BAT","AR","BOWL"].forEach(function(r){
    var cls="pf-btn"+(_pickerRole===r?" active":""),lbl=r==="All"?"All":r==="WK"?"\uD83E\uDD4E WK":r==="BAT"?"\u26A1 BAT":r==="AR"?"\uD83C\uDF00 AR":"\uD83C\uDFCF BOWL";
    h+='<button class="'+cls+'" onclick="_pickerRole=\''+r+'\';if(_state)render(_state)">'+lbl+'</button>';
  });
  h+='</div><div class="picker-filters">';
  ["All Teams"].concat(teams).forEach(function(t){
    var cls="pf-btn"+(_pickerTeam===t?" active":"");
    h+='<button class="'+cls+'" onclick="_pickerTeam=\''+escAttr(t)+'\';if(_state)render(_state)">'+esc(t)+'</button>';
  });
  h+='</div></div><div class="picker-list">';
  if(lockMsg)h+='<div class="picker-lockout-banner">'+esc(lockMsg)+'</div>';
  if(filtered.length===0)h+='<div class="picker-empty">No players match.</div>';
  else filtered.forEach(function(p){
    var key=p.id||p.name,isSel=!!(selSet[key]||selSet[p.name]);
    var over=!isSel&&!xi_full&&(rem-(p.price||0)<-0.001),isFull=xi_full&&!isSel;
    var cls="picker-row"+(isSel?" selected":"")+(isFull?" full-xi":"")+((!xi_full&&over&&!isSel)?" over-budget":"");
    var lockStyle=over?' style="opacity:0.60;pointer-events:none;"':'';
    var oc;
    if(isSel){oc=' onclick="_nwToggle(\''+escAttr(key)+'\')"';}
    else if(xi_full){oc=' onclick="_showSwapModal(\''+escAttr(key)+'\')"';}
    else if(!over){oc=' onclick="_nwToggle(\''+escAttr(key)+'\')"';}
    else{oc='';}
    var disp=p.name+(p.team?" - "+p.team:"");
    var pts=ptsMap[key]!=null?ptsMap[key]:(ptsMap[(p.name||'').toLowerCase()]!=null?ptsMap[(p.name||'').toLowerCase()]:null);
    var priceHtml=(p.price?p.price.toFixed(1)+' CR':'')+(pts!=null?'<br><span class="prow-pts">'+pts+' PTS</span>':'');
    h+='<div class="'+cls+'"'+(oc||'')+lockStyle+'><div class="prow-avatar '+_avClass(p.team)+'">'+esc(_initials(p.name))+'</div><div class="prow-info"><div class="prow-name">'+esc(disp)+'</div>'+(p.role?'<div class="prow-sub">'+esc(p.role)+'</div>':'')+'</div><div class="prow-price">'+priceHtml+'</div><div class="prow-tick">\u2713</div></div>';
  });
  return h+'</div></div>';
}

// ─── PITCH VIEW ───────────────────────────────────────────────────────────────
function _buildPitchView(teamArr,capId,vcId){
  if(!teamArr||teamArr.length===0)return'<p class="empty">No XI recorded.</p>';
  var groups={BOWL:[],AR:[],BAT:[],WK:[]},roleOrder=["BOWL","AR","BAT","WK"],roleLabels={BOWL:"Bowlers",AR:"All-Rounders",BAT:"Batsmen",WK:"Wicket-Keepers"};
  teamArr.forEach(function(id){var p=resolvePlayer(id),r=(p.role||"BAT").toUpperCase();if(!groups[r])r="BAT";groups[r].push({id:id,player:p});});
  var cost=_teamCost(teamArr),rem=Math.round((BUDGET_TOTAL-cost)*10)/10,pct=Math.min(100,(cost/BUDGET_TOTAL)*100);
  var capP=capId?resolvePlayer(capId):null,vcP=vcId?resolvePlayer(vcId):null;
  var h='<div class="pitch-topbar"><div class="pitch-budget"><div><div class="pitch-budget-label">Budget Remaining</div><div class="pitch-budget-amt">\u20B9'+rem.toFixed(1)+'cr</div><div class="pitch-track"><div class="pitch-fill" style="width:'+pct+'%"></div></div></div></div><div class="pitch-count">'+teamArr.length+' / '+XI_SIZE+'</div></div>';
  h+='<div class="pitch-pills"><span class="pitch-pill pill-wk">WK: '+groups.WK.length+'</span><span class="pitch-pill pill-bat">BAT: '+groups.BAT.length+'</span><span class="pitch-pill pill-ar">AR: '+groups.AR.length+'</span><span class="pitch-pill pill-bowl">BOWL: '+groups.BOWL.length+'</span>'+(teamArr.length===XI_SIZE?'<span class="pitch-pill pill-valid">\u2705 Valid</span>':'<span class="pitch-pill pill-invalid">\u26A0 '+teamArr.length+' players</span>')+'</div>';

// ─── ADMIN TAB (Cricbuzz URL management) ─────────────────────────────────────
function _buildAdminTab(){
  var h='<div class="card">';
  h+='<div class="user-header-bar" style="margin-bottom:14px">';
  h+='<h3 class="section-title" style="margin:0">\u2699\uFE0F Match URL Admin</h3>';
  h+='<button class="btn btn-ghost btn-sm" onclick="_adminMatches=null;_loadAdminMatches();if(_state)render(_state)">\u27F3 Refresh</button>';
  h+='</div>';
  h+='<p style="color:var(--muted);font-size:12px;margin-bottom:12px">Paste the Cricbuzz scorecard URL for each completed match, then click Save. The scraper will run automatically in the background.</p>';
  h+='<div class="admin-filter">';
  [{v:"all",l:"All"},{v:"completed",l:"\uD83D\uDFE2 Completed"},{v:"upcoming",l:"\uD83D\uDD51 Upcoming"},{v:"no-id",l:"\u26A0 Missing IDs"}].forEach(function(f){
    h+='<button class="admin-filter-btn'+(_adminFilter===f.v?' active':'')+'" onclick="_adminFilter=\''+f.v+'\';if(_state)render(_state)">'+f.l+'</button>';
  });

  if(!_adminMatches){return h+'<p style="color:var(--muted);font-size:13px">Loading matches\u2026</p></div>';}
  var list=_adminMatches.filter(function(m){
    if(_adminFilter==="completed")return m.status==="completed";
    if(_adminFilter==="upcoming")return m.status==="upcoming";
    if(_adminFilter==="no-id"){var u=m.scorecard_url||"";var last=u.split("/").pop();return !last||last==="00000"||!/[1-9]/.test(last);}
    return true;
  });
  if(list.length===0){return h+'<p style="color:var(--muted);font-size:13px">No matches match the filter.</p></div>';}
  list.forEach(function(m){
    var hasId=m.scorecard_url&&/[1-9]\d{4,}/.test(m.scorecard_url||"00000");
    var inputId="url-"+m.id,statusId="st-"+m.id;
    h+='<div class="admin-match-row">';
    h+='<div class="admin-match-title">'+esc(m.title||m.id)+'<span class="status-pill status-'+m.status+'">'+m.status+'</span>'+(hasId?'<span style="color:var(--teal);font-size:10px;margin-left:6px">\u2705 Has ID</span>':'<span style="color:#FF6B6B;font-size:10px;margin-left:6px">\u26A0 No ID</span>')+'</div>';
    h+='<div class="admin-match-meta">Match ID: '+esc(m.id)+' | Week '+m.week_no+'</div>';
    h+='<div class="admin-url-row">';
    h+='<input class="admin-url-input" id="'+inputId+'" type="url" placeholder="https://www.cricbuzz.com/live-cricket-scorecard/XXXXXX/..." value="'+esc(m.scorecard_url||'')+'">';
    h+='<button class="admin-save-btn" id="btn-'+m.id+'" onclick="_adminSaveUrl(\''+escAttr(m.id)+"','"+inputId+"','"+statusId+'\')" >Save &amp; Scrape</button>';
    h+='<span class="admin-save-status" id="'+statusId+'"></span>';
    h+='</div>';
    if(m.scorecard_url)h+='<div class="admin-url-current">Current: '+esc(m.scorecard_url)+'</div>';
    h+='</div>';
  });
  return h+'</div>';
}

// ─── SWAP MODAL ───────────────────────────────────────────────────────────────
function _showSwapModal(incomingId){
  var inP=resolvePlayer(incomingId),inPrice=inP.price||0;
  var h='<div id="swap-modal" onclick="if(event.target.id===\'swap-modal\')_closeSwapModal()" style="position:fixed;inset:0;z-index:999;background:rgba(7,17,31,.88);display:flex;align-items:flex-end;justify-content:center;">';
  h+='<div style="background:var(--surface);border:1px solid var(--border);border-radius:16px 16px 0 0;width:100%;max-width:520px;padding:18px 16px 32px;max-height:80vh;overflow-y:auto;">';
  h+='<div style="font-size:13px;font-weight:700;color:var(--gold);margin-bottom:3px;">\u21C4 Swap in: '+esc(inP.name)+(inP.price?' ('+inP.price.toFixed(1)+' CR)':'')+'</div>';
  h+='<div style="font-size:11px;color:var(--muted);margin-bottom:14px;">Select who to remove from your XI</div>';
  _nwDraft.team.forEach(function(id){
    var cur=resolvePlayer(id),avC=_avClass(cur.team),curPrice=cur.price||0;
    var diff=Math.round((inPrice-curPrice)*10)/10;
    var newRem=Math.round((_remaining()+curPrice-inPrice)*10)/10;
    var canAfford=newRem>=-0.001;
    var roleTeam=[cur.role,cur.team].filter(Boolean).join(' \u00B7 ')+(id===_nwDraft.cap?' \u00B7 C':(id===_nwDraft.vc?' \u00B7 VC':''));
    var diffLabel=diff>0?'<span style="color:#FF6B6B;font-size:10px;font-weight:600">\u2212'+diff.toFixed(1)+' CR</span>':diff<0?'<span style="color:var(--teal);font-size:10px;font-weight:600">+'+Math.abs(diff).toFixed(1)+' CR</span>':'<span style="color:var(--muted);font-size:10px">Same cost</span>';
    h+='<div onclick="'+(canAfford?'_doSwap(\''+escAttr(id)+'\',\''+escAttr(incomingId)+'\')':'')+'" style="display:flex;align-items:center;gap:10px;padding:9px 10px;border-radius:8px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.07);margin-bottom:7px;cursor:'+(canAfford?'pointer':'not-allowed')+';opacity:'+(canAfford?'1':'0.35')+'">';
    h+='<div class="prow-avatar '+avC+'">'+esc(_initials(cur.name||id))+'</div>';
    h+='<div style="flex:1;min-width:0"><div style="font-size:13px;font-weight:600;color:var(--text)">'+esc(cur.name||id)+'</div><div style="font-size:10px;color:var(--muted)">'+esc(roleTeam)+'</div></div>';
    h+='<div style="text-align:right"><div style="font-size:12px;font-weight:700;color:var(--gold)">'+(curPrice?curPrice.toFixed(1)+' CR':'')+'</div>'+diffLabel+'</div>';
    h+='</div>';
  });
  h+='<button onclick="_closeSwapModal()" style="margin-top:8px;width:100%;padding:10px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);border-radius:8px;color:var(--muted);font-size:13px;font-weight:600;cursor:pointer;">Cancel</button>';
  h+='</div></div>';
  var el=document.createElement('div');
  el.innerHTML=h;
  document.body.appendChild(el.firstChild);
}
function _closeSwapModal(){var m=document.getElementById('swap-modal');if(m)m.remove();}
function _doSwap(removeId,addId){
  _closeSwapModal();
  _nwDraft.team=_nwDraft.team.filter(function(x){return x!==removeId;});
  if(_nwDraft.cap===removeId)_nwDraft.cap=null;
  if(_nwDraft.vc===removeId)_nwDraft.vc=null;
  _nwDraft.team.push(addId);
  if(_state)render(_state);
}

// ─── RENDER ───────────────────────────────────────────────────────────────────
function render(state){
  _state=state;members=state.members||{};matches=state.matches||[];
  hideLoading();hideErrorBanner();
  var memberNames=Object.keys(members).sort();
  var html='<div class="wrap">';
  html+='<h2 class="page-title">\uD83C\uDFCF IPL Fantasy 2026</h2>';
  html+='<p class="subtitle">'+memberNames.length+' members \u00B7 '+matches.length+' matches \u00B7 Week '+_currentWeek+' \u00B7 \uD83D\uDCB0 '+BUDGET_TOTAL.toFixed(0)+' CR budget</p>';
  if(!_username){
    html+=_buildLoginCard(memberNames);
    html+=_buildLeaderboardCard(_leaderboard);
    html+=_buildMembersCard(memberNames);
  } else {
    var ini=_initials(_username);
    html+='<div class="card"><div class="user-header-bar"><div class="user-header-left"><div class="user-avatar-large">'+esc(ini)+'</div><div><p class="label">Logged in as</p><p class="name">'+esc(_username)+'</p></div></div><div class="user-header-btns"><button class="btn-refresh" id="refresh-btn" onclick="_refreshData()" title="Refresh">\u27F3 Refresh</button><button class="btn btn-ghost btn-sm" onclick="logout()">Switch user</button></div></div><div id="refresh-status" class="refresh-status" style="margin-top:4px;text-align:right"></div></div>';
    html+='<div class="tabs">';
    [
      {id:"team",label:"This Week \uD83D\uDD12"},
      {id:"next",label:"Next Week \u270F\uFE0F"},
      {id:"history",label:"History \uD83D\uDCD6"},
      {id:"points",label:"Points \uD83D\uDCCA"},
      {id:"leaderboard",label:"Leaderboard"},
      {id:"matches",label:"Matches"},
      {id:"members",label:"Members"},
      {id:"admin",label:"Admin \u2699\uFE0F"},
    ].forEach(function(t){
      html+='<button class="tab-btn'+(_activeTab===t.id?' active':'')+'" onclick="switchTab(\''+t.id+'\')">'+t.label+'</button>';
    });
    html+='</div>';
    if     (_activeTab==="team")        {html+=_buildThisWeekCard();html+=_buildDevTools();}
    else if(_activeTab==="next")        html+=_buildNextWeekCard();
    else if(_activeTab==="history")     html+=_buildHistoryTab();
    else if(_activeTab==="points")      html+=_buildPointsTab();
    else if(_activeTab==="leaderboard") html+=_buildLeaderboardCard(_leaderboard);
    else if(_activeTab==="matches")     html+=_buildMatchesCard(matches);
    else if(_activeTab==="members")     html+=_buildMembersCard(memberNames);
    else if(_activeTab==="admin")       html+=_buildAdminTab();
  }
  html+='</div>';
  $app.innerHTML=html;
  if(_activeTab==="next"){var inp=document.getElementById("picker-search-input");if(inp){inp.focus();inp.selectionStart=inp.selectionEnd=inp.value.length;}}
}

function renderLeaderboard(lb){_leaderboard=lb;if(_state&&(_activeTab==="leaderboard"||!_username))render(_state);}
function setPlayers(pl){if(!pl)return;_players=pl;if(_state)render(_state);}

// ─── BOOTSTRAP ────────────────────────────────────────────────────────────────
function _bootstrap(){
  var savedUser=getSavedUsername();
  var stP=fetch("/api/state",{headers:{"Accept":"application/json"}}).then(function(r){if(!r.ok)throw new Error("HTTP "+r.status);return r.json();});
  var hP=(savedUser&&window.IplApi)?window.IplApi.getHistory(savedUser).catch(function(){return null;}):Promise.resolve(null);
  var plP=(!_players&&window.IplApi)?window.IplApi.getPlayers().catch(function(){return null;}):Promise.resolve(null);
  var lbP=fetch("/api/leaderboard",{headers:{"Accept":"application/json"}}).then(function(r){return r.ok?r.json():null;}).catch(function(){return null;});
  var wkP=fetch("/api/current-week",{headers:{"Accept":"application/json"}}).then(function(r){return r.ok?r.json():null;}).catch(function(){return null;});
  stP.then(function(state){
    if(!_username){if(savedUser&&state.members&&state.members[savedUser])_username=savedUser;else if(savedUser)clearUsername();}
    render(state);
  }).catch(function(err){
    console.error("[IPL] bootstrap:",err);
    showErrorBanner("Could not reach server \u2014 retrying\u2026");
  });
  Promise.all([stP,hP]).then(function(results){
    var state=results[0],history=results[1];
    if(!state)return;
    if(history&&history.ok){
      _historyData=history;_currentWeek=history.current_week;
      if(_nwDraft.team.length===0){
        var cur=_getCurrentWeekRow(history);
        if(cur){var nw=cur.next_week,tw=cur.this_week;if(nw&&nw.team&&nw.team.length>0)_nwDraft={team:nw.team.slice(),cap:nw.cap,vc:nw.vc};else if(tw&&tw.team&&tw.team.length>0)_nwDraft={team:tw.team.slice(),cap:tw.cap,vc:tw.vc};}
      }
    }
    render(state);
    if(_activeTab==="points"&&_username&&!_ptsData)_loadPoints();
  }).catch(function(){});
  plP.then(function(pl){if(pl&&pl.ok!==false){setPlayers(pl);window.dispatchEvent(new CustomEvent("ipl:players-updated",{detail:pl}));}});
  lbP.then(function(lb){if(lb){var norm=window.normaliseLeaderboard?window.normaliseLeaderboard(lb):lb;renderLeaderboard(norm);}});
  wkP.then(function(d){if(d&&d.ok&&d.week_no!==_currentWeek){_currentWeek=d.week_no;if(_state)render(_state);}});
}

var _glueReady=false;
window.addEventListener("ipl:ready",function(){_glueReady=true;_bootstrap();});
setTimeout(function(){if(!_glueReady&&window.IplApi){_glueReady=true;_bootstrap();}},50);

window.addEventListener("ipl:state-updated",function(e){
  var state=e.detail;
  if(!state||typeof state.members!=="object")return;
  if(!_username){var saved=getSavedUsername();if(saved&&state.members[saved])_username=saved;else if(saved&&!state.members[saved])clearUsername();}
  render(state);
});
window.addEventListener("ipl:leaderboard-updated",function(e){renderLeaderboard(e.detail);});
window.addEventListener("ipl:players-updated",function(e){setPlayers(e.detail);});
window.addEventListener("ipl:error",function(e){var err=e.detail;if(err&&err.status&&err.status<500)return;showErrorBanner(err&&err.serverMessage?err.serverMessage:"Server error \u2014 retrying in 60 s\u2026");});
window.addEventListener("ipl:saved",function(){_bootstrap();});
</script>
