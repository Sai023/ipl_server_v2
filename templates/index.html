<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#07111F" />
  <link rel="manifest" href="/manifest.json" />
  <title>IPL Fantasy 2026</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:#07111F; --surface:#0E1E35; --border:rgba(245,197,24,.18);
      --gold:#F5C518; --teal:#00D4AA; --text:#D8E8F5; --muted:#5F7A9B;
      --dim:#3D5572; --radius:14px; --font:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
    }
    html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--font);-webkit-font-smoothing:antialiased;}
    #app-loading{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px;background:var(--bg);z-index:100;transition:opacity .4s ease;}
    #app-loading.hidden{opacity:0;pointer-events:none;}
    #app-loading .logo{font-size:56px;} #app-loading h1{color:var(--gold);font-size:22px;font-weight:700;} #app-loading p{color:var(--muted);font-size:14px;}
    .spinner{width:36px;height:36px;border:3px solid rgba(245,197,24,.15);border-top-color:var(--gold);border-radius:50%;animation:spin 1s linear infinite;}
    @keyframes spin{to{transform:rotate(360deg);}}
    #app{min-height:100vh;padding-bottom:60px;}
    #error-banner{display:none;position:fixed;top:0;left:0;right:0;z-index:200;background:rgba(220,50,50,.92);color:#fff;font-size:13px;text-align:center;padding:8px 16px;}
    #error-banner.visible{display:block;}
    .wrap{max-width:900px;margin:0 auto;padding:20px 14px;}
    .card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:18px;margin-bottom:14px;}
    .card-teal{border-color:rgba(0,212,170,.3);} .card-locked{border-color:rgba(245,197,24,.3);background:rgba(245,197,24,.025);}
    h2.page-title{color:var(--gold);font-size:20px;margin-bottom:2px;} .subtitle{color:var(--muted);font-size:13px;margin-bottom:18px;}
    h3.section-title{color:var(--text);font-size:14px;font-weight:700;margin-bottom:12px;}
    .btn{padding:9px 18px;border:none;border-radius:8px;font-weight:700;font-size:13px;cursor:pointer;white-space:nowrap;transition:opacity .15s;}
    .btn:disabled{opacity:.4;cursor:not-allowed;} .btn-gold{background:var(--gold);color:#07111F;} .btn-teal{background:var(--teal);color:#07111F;}
    .btn-ghost{background:transparent;color:var(--muted);border:1px solid rgba(95,122,155,.4);font-weight:400;}
    .btn-danger{background:rgba(220,50,50,.12);color:#FF6B6B;border:1px solid rgba(220,50,50,.3);font-weight:600;}
    .btn-sm{padding:6px 12px;font-size:12px;}
    .badge{font-size:10px;font-weight:700;padding:2px 6px;border-radius:4px;letter-spacing:.03em;line-height:1.4;}
    .badge-c{background:var(--gold);color:#07111F;} .badge-vc{background:var(--teal);color:#07111F;}
    .badge-wk{background:rgba(0,212,170,.15);color:var(--teal);} .badge-bat{background:rgba(245,197,24,.15);color:var(--gold);}
    .badge-ar{background:rgba(130,90,230,.2);color:#A78BFA;} .badge-bowl{background:rgba(220,50,50,.15);color:#FF6B6B;}
    .badge-lock{background:rgba(245,197,24,.1);color:var(--gold);padding:2px 7px;border-radius:4px;font-size:11px;font-weight:600;}
    .tabs{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:14px;}
    .tab-btn{padding:7px 13px;border:1px solid rgba(255,255,255,.08);border-radius:8px;background:transparent;color:var(--muted);font-size:12px;cursor:pointer;transition:all .15s;}
    .tab-btn.active{background:var(--surface);color:var(--text);border-color:var(--border);} .tab-btn:hover:not(.active){color:var(--text);}
    .user-header{display:flex;justify-content:space-between;align-items:center;}
    .user-header .label,.user-header-bar .label{color:var(--muted);font-size:11px;text-transform:uppercase;letter-spacing:.05em;}
    .user-header .name,.user-header-bar .name{color:var(--text);font-size:16px;font-weight:700;margin-top:2px;}
    .budget-bar{display:flex;align-items:center;gap:10px;background:rgba(0,0,0,.2);border-radius:8px;padding:8px 12px;margin-bottom:12px;border:1px solid rgba(255,255,255,.06);}
    .budget-label{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.04em;}
    .budget-amount{font-size:18px;font-weight:800;} .budget-amount.ok{color:var(--teal);} .budget-amount.warn{color:var(--gold);} .budget-amount.over{color:#FF6B6B;}
    .budget-track{flex:1;height:6px;background:rgba(255,255,255,.07);border-radius:3px;overflow:hidden;} .budget-fill{height:100%;border-radius:3px;transition:width .3s,background .3s;}
    .week-label{font-size:11px;color:var(--muted);font-weight:600;letter-spacing:.04em;text-transform:uppercase;margin-bottom:6px;}
    .xi-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:8px;margin-bottom:12px;}
    .xi-card{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.07);border-radius:10px;padding:10px;display:flex;align-items:center;gap:9px;position:relative;}
    .xi-card.is-cap{border-color:rgba(245,197,24,.45);background:rgba(245,197,24,.06);} .xi-card.is-vc{border-color:rgba(0,212,170,.35);background:rgba(0,212,170,.05);}
    .xi-avatar{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;flex-shrink:0;background:rgba(255,255,255,.1);color:var(--text);}
    .xi-info{flex:1;min-width:0;} .xi-name{font-size:12px;font-weight:600;color:var(--text);line-height:1.3;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;} .xi-sub{font-size:10px;color:var(--muted);margin-top:2px;}
    .xi-badge-wrap{position:absolute;top:6px;right:6px;}
    .xi-edit-row{display:flex;gap:3px;position:absolute;bottom:5px;right:5px;}
    .ecap-btn,.evc-btn,.erem-btn{width:22px;height:22px;border:none;border-radius:4px;font-size:9px;font-weight:800;cursor:pointer;display:flex;align-items:center;justify-content:center;}
    .ecap-btn{background:rgba(245,197,24,.15);color:var(--gold);} .ecap-btn.on{background:var(--gold);color:#07111F;}
    .evc-btn{background:rgba(0,212,170,.15);color:var(--teal);} .evc-btn.on{background:var(--teal);color:#07111F;}
    .erem-btn{background:rgba(220,50,50,.15);color:#FF6B6B;font-size:13px;} .erem-btn:hover{background:rgba(220,50,50,.35);}
    .xi-card.editable{padding-bottom:32px;}
    .av-rcb{background:rgba(220,50,50,.3);color:#FF6B6B;} .av-srh{background:rgba(245,120,0,.3);color:#F97316;} .av-mi{background:rgba(0,100,200,.3);color:#60A5FA;}
    .av-kkr{background:rgba(90,30,150,.3);color:#C084FC;} .av-csk{background:rgba(245,197,24,.2);color:var(--gold);} .av-rr{background:rgba(255,0,100,.2);color:#FB7185;}
    .av-dc{background:rgba(0,150,220,.2);color:#38BDF8;} .av-pbks{background:rgba(220,30,30,.2);color:#FCA5A5;} .av-lsg{background:rgba(0,180,120,.2);color:#4ADE80;} .av-gt{background:rgba(0,160,200,.2);color:#67E8F9;}
    .cap-hint{display:flex;gap:14px;flex-wrap:wrap;font-size:11px;color:var(--muted);margin-bottom:10px;}
    .cap-hint span{display:flex;align-items:center;gap:5px;}
    .save-row{display:flex;align-items:center;gap:10px;margin-top:6px;} .save-status{font-size:12px;} .save-status.ok{color:var(--teal);} .save-status.err{color:#FF6B6B;}
    .picker-shell{background:var(--surface);border:1px solid rgba(0,212,170,.2);border-radius:var(--radius);margin-top:10px;overflow:hidden;}
    .picker-toolbar{padding:12px 12px 8px;border-bottom:1px solid rgba(255,255,255,.05);background:rgba(0,0,0,.15);}
    .picker-search{display:flex;align-items:center;gap:8px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.08);border-radius:8px;padding:6px 10px;margin-bottom:8px;}
    .picker-search input{background:none;border:none;outline:none;color:var(--text);font-size:13px;flex:1;font-family:var(--font);}
    .picker-filters{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:5px;}
    .pf-btn{padding:4px 10px;border:1px solid rgba(255,255,255,.1);border-radius:20px;background:transparent;color:var(--muted);font-size:11px;cursor:pointer;transition:all .15s;}
    .pf-btn.active{background:var(--teal);color:#07111F;border-color:var(--teal);font-weight:700;} .pf-btn:hover:not(.active){color:var(--text);border-color:rgba(255,255,255,.2);}
    .picker-list{max-height:340px;overflow-y:auto;padding:4px 0;} .picker-empty{padding:24px;text-align:center;color:var(--muted);font-size:13px;}
    .picker-lockout-banner{padding:8px 14px;font-size:12px;font-weight:600;background:rgba(245,197,24,.07);border-bottom:1px solid rgba(245,197,24,.18);color:var(--gold);text-align:center;letter-spacing:.02em;}
    .picker-row{display:flex;align-items:center;gap:10px;padding:8px 12px;cursor:pointer;transition:background .1s;border-bottom:1px solid rgba(255,255,255,.03);}
    .picker-row:hover:not(.full-xi){background:rgba(255,255,255,.04);} .picker-row.selected{background:rgba(0,212,170,.07);} .picker-row.selected:hover{background:rgba(0,212,170,.12);}
    .picker-row.full-xi{opacity:0.35;cursor:not-allowed;} .picker-row.over-budget{opacity:0.35;cursor:not-allowed;}
    .prow-avatar{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:800;flex-shrink:0;background:rgba(255,255,255,.1);color:var(--text);}
    .prow-info{flex:1;min-width:0;} .prow-name{font-size:13px;font-weight:600;color:var(--text);} .prow-sub{font-size:10px;color:var(--muted);margin-top:1px;}
    .prow-price{font-size:12px;font-weight:700;color:var(--gold);min-width:44px;text-align:right;} .prow-tick{width:18px;font-size:13px;color:var(--teal);text-align:center;opacity:0;}
    .picker-row.selected .prow-tick{opacity:1;}
    .history-bar{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:12px;font-size:12px;color:var(--muted);}
    .history-bar select{background:var(--surface);border:1px solid rgba(255,255,255,.12);color:var(--text);font-size:12px;border-radius:6px;padding:4px 8px;cursor:pointer;}
    .ro-note{color:var(--gold);font-size:11px;font-weight:600;}
    .lb-table{width:100%;border-collapse:collapse;font-size:13px;}
    .lb-table th{text-align:left;color:var(--muted);font-weight:600;padding:6px 8px;border-bottom:1px solid rgba(255,255,255,.06);}
    .lb-table td{padding:8px;border-bottom:1px solid rgba(255,255,255,.04);} .lb-table tr:last-child td{border-bottom:none;}
    .lb-table .rank{color:var(--gold);font-weight:700;width:30px;} .lb-table .pts{color:var(--teal);font-weight:700;text-align:right;}
    .lb-table .mvp{color:var(--dim);font-size:11px;} .lb-table tr.me td{background:rgba(245,197,24,.05);}
    .match-item{padding:11px 0;border-bottom:1px solid rgba(255,255,255,.04);} .match-item:last-child{border-bottom:none;}
    .match-title{font-size:13px;color:var(--text);margin-bottom:2px;} .match-meta{font-size:11px;color:var(--muted);}
    .status-pill{display:inline-block;font-size:10px;font-weight:700;padding:2px 7px;border-radius:10px;margin-left:6px;}
    .status-live{background:rgba(220,50,50,.2);color:#FF6B6B;} .status-completed{background:rgba(0,212,170,.15);color:var(--teal);} .status-upcoming{background:rgba(255,255,255,.08);color:var(--muted);}
    .members-dual{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-top:4px;}
    @media(max-width:600px){.members-dual{grid-template-columns:1fr;}}
    .member-xi-card{background:rgba(255,255,255,.02);border:1px solid rgba(255,255,255,.07);border-radius:12px;padding:14px;}
    .member-xi-header{display:flex;align-items:center;gap:8px;margin-bottom:10px;}
    .member-xi-name{font-size:15px;font-weight:800;color:var(--text);} .member-xi-name.me{color:var(--gold);}
    .me-tag{font-size:10px;font-weight:700;color:var(--gold);background:rgba(245,197,24,.12);padding:2px 6px;border-radius:4px;}
    .member-xi-card .xi-grid{grid-template-columns:1fr;gap:5px;} .member-xi-card .xi-card{padding:7px 9px;}
    .member-xi-card .xi-avatar{width:28px;height:28px;font-size:10px;} .member-xi-card .xi-name{font-size:11px;} .member-xi-card .xi-sub{font-size:9px;} .member-xi-card .xi-badge-wrap{top:5px;right:5px;}
    .login-row{display:flex;gap:8px;margin-bottom:8px;}
    .login-row select{flex:1;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.12);border-radius:8px;color:var(--text);font-size:13px;padding:8px 10px;}
    .register-hint{font-size:12px;color:var(--muted);margin-bottom:6px;}
    #register-input{width:100%;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.12);border-radius:8px;color:var(--text);font-size:13px;padding:8px 10px;}
    .devtools{background:rgba(220,50,50,.05);border:1px solid rgba(220,50,50,.2);border-radius:var(--radius);padding:14px;margin-bottom:14px;}
    .devtools h4{color:#FF6B6B;font-size:13px;margin-bottom:8px;} .devtools p{color:var(--muted);font-size:12px;margin-bottom:10px;line-height:1.5;}
    #rollover-result{font-size:12px;margin-top:8px;min-height:16px;}
    .refresh-bar{display:flex;align-items:center;justify-content:flex-end;gap:8px;margin-bottom:6px;}
    .btn-refresh{display:flex;align-items:center;gap:6px;background:rgba(0,212,170,.1);color:var(--teal);border:1px solid rgba(0,212,170,.3);border-radius:8px;padding:6px 13px;font-size:12px;font-weight:700;cursor:pointer;transition:all .15s;}
    .btn-refresh:hover{background:rgba(0,212,170,.2);} .btn-refresh:disabled{opacity:.4;cursor:not-allowed;} .btn-refresh .spin{display:inline-block;animation:spin 1s linear infinite;}
    .refresh-status{font-size:11px;color:var(--muted);} .refresh-status.ok{color:var(--teal);} .refresh-status.err{color:#FF6B6B;}
    .user-header-bar{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px;}
    .user-header-left{display:flex;align-items:center;gap:10px;}
    .user-avatar-large{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:800;background:rgba(245,197,24,.15);color:var(--gold);border:1px solid rgba(245,197,24,.3);flex-shrink:0;}
    .user-header-btns{display:flex;gap:6px;align-items:center;}
    .login-member-chips{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px;}
    .login-chip{padding:7px 16px;border-radius:20px;border:1px solid rgba(255,255,255,.12);background:rgba(255,255,255,.04);font-size:13px;font-weight:600;color:var(--text);cursor:pointer;transition:all .15s;}
    .login-chip:hover{border-color:var(--gold);color:var(--gold);background:rgba(245,197,24,.08);}
    .history-empty{padding:20px;text-align:center;color:var(--muted);font-size:13px;line-height:1.6;} .history-empty strong{color:var(--text);display:block;margin-bottom:4px;}
    .empty{color:var(--muted);font-size:14px;padding:8px 0;}
    .members-grid{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:14px;}
    .member-pill{padding:5px 12px;border-radius:20px;border:1px solid rgba(255,255,255,.1);font-size:12px;color:var(--muted);cursor:pointer;transition:all .15s;}
    .member-pill:hover{color:var(--text);border-color:rgba(255,255,255,.2);} .member-pill.me{color:var(--gold);border-color:rgba(245,197,24,.4);}
    @media(max-width:500px){.wrap{padding:14px 10px;}.xi-grid{grid-template-columns:1fr 1fr;}.tabs{gap:3px;}.tab-btn{padding:6px 10px;font-size:11px;}}
    /* Pitch */
    .pitch-topbar{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:10px;}
    .pitch-budget{display:flex;align-items:center;gap:8px;background:rgba(0,0,0,.3);border:1px solid rgba(255,255,255,.1);border-radius:8px;padding:6px 12px;flex:1;min-width:180px;}
    .pitch-budget-label{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.04em;} .pitch-budget-amt{font-size:18px;font-weight:900;color:var(--gold);}
    .pitch-track{flex:1;height:5px;background:rgba(255,255,255,.08);border-radius:3px;overflow:hidden;margin-top:4px;} .pitch-fill{height:100%;background:var(--gold);border-radius:3px;}
    .pitch-count{font-size:12px;font-weight:700;color:var(--text);background:rgba(0,0,0,.25);border:1px solid rgba(255,255,255,.1);border-radius:6px;padding:5px 12px;white-space:nowrap;}
    .pitch-pills{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px;}
    .pitch-pill{font-size:11px;font-weight:700;padding:4px 10px;border-radius:20px;border:1px solid;}
    .pill-wk{color:var(--teal);border-color:rgba(0,212,170,.4);background:rgba(0,212,170,.1);} .pill-bat{color:var(--gold);border-color:rgba(245,197,24,.4);background:rgba(245,197,24,.1);}
    .pill-ar{color:#A78BFA;border-color:rgba(167,139,250,.4);background:rgba(167,139,250,.1);} .pill-bowl{color:#FF6B6B;border-color:rgba(255,107,107,.4);background:rgba(255,107,107,.1);}
    .pill-valid{color:var(--teal);border-color:rgba(0,212,170,.4);background:rgba(0,212,170,.1);} .pill-invalid{color:#FF6B6B;border-color:rgba(255,107,107,.4);background:rgba(255,107,107,.1);}
    .pitch-cvc{background:rgba(0,0,0,.25);border:1px solid rgba(255,255,255,.08);border-radius:8px;padding:7px 14px;font-size:12px;color:var(--muted);margin-bottom:12px;line-height:1.6;}
    .pitch-cvc strong{color:var(--text);} .cvc-c{color:var(--gold);font-weight:800;} .cvc-vc{color:var(--teal);font-weight:800;}
    .pitch-ground{border-radius:14px;overflow:hidden;position:relative;background:radial-gradient(ellipse 68% 55% at 50% 50%,#2d6a2d 0%,#1e5c1e 40%,#134813 70%,#0c380c 100%);padding:20px 10px;min-height:400px;display:flex;flex-direction:column;justify-content:space-between;gap:0;}
    .pitch-ground::before{content:"";position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);width:60px;height:160px;border:1px solid rgba(255,255,255,.15);border-radius:4px;pointer-events:none;}
    .pitch-row{display:flex;flex-direction:column;align-items:center;gap:6px;margin-bottom:8px;} .pitch-row:last-child{margin-bottom:0;}
    .pitch-role-label{font-size:9px;font-weight:800;letter-spacing:.12em;color:rgba(255,255,255,.5);text-transform:uppercase;}
    .pitch-players{display:flex;justify-content:center;flex-wrap:wrap;gap:14px;}
    .pitch-player{display:flex;flex-direction:column;align-items:center;gap:4px;cursor:default;}
    .pitch-circle{width:52px;height:52px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:900;border:2px solid rgba(255,255,255,.25);position:relative;box-shadow:0 2px 8px rgba(0,0,0,.4);transition:transform .15s;}
    .pitch-circle:hover{transform:scale(1.08);}
    .pitch-badge{position:absolute;top:-4px;right:-4px;width:18px;height:18px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:8px;font-weight:900;border:1px solid rgba(0,0,0,.3);}
    .pitch-badge-c{background:var(--gold);color:#07111F;} .pitch-badge-vc{background:var(--teal);color:#07111F;}
    .pitch-name{font-size:10px;font-weight:700;color:rgba(255,255,255,.9);text-align:center;max-width:60px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;text-shadow:0 1px 3px rgba(0,0,0,.8);}
    @media(max-width:480px){.pitch-circle{width:42px;height:42px;font-size:11px;}.pitch-players{gap:8px;}.pitch-name{font-size:9px;max-width:48px;}}
    /* Points tab */
    .pts-summary{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:16px;}
    .pts-stat{background:rgba(0,0,0,.25);border:1px solid rgba(255,255,255,.08);border-radius:10px;padding:10px 16px;text-align:center;flex:1;min-width:80px;}
    .pts-stat .val{font-size:22px;font-weight:900;color:var(--gold);} .pts-stat .lbl{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin-top:2px;}
    .pts-table{width:100%;border-collapse:collapse;font-size:13px;}
    .pts-table th{text-align:left;color:var(--muted);font-weight:600;padding:7px 8px;border-bottom:1px solid rgba(255,255,255,.07);font-size:11px;text-transform:uppercase;letter-spacing:.04em;}
    .pts-table td{padding:8px;border-bottom:1px solid rgba(255,255,255,.04);vertical-align:middle;}
    .pts-table tr:last-child td{border-bottom:none;} .pts-table tr:hover td{background:rgba(255,255,255,.02);}
    .pts-table .pts-cell{color:var(--teal);font-weight:700;text-align:right;font-size:14px;}
    .pts-expand-btn{background:rgba(255,255,255,.05);border:none;color:var(--muted);border-radius:4px;padding:2px 8px;font-size:11px;cursor:pointer;margin-left:6px;}
    .pts-expand-btn:hover{color:var(--text);background:rgba(255,255,255,.1);}
    .pts-matches{display:none;background:rgba(0,0,0,.15);border-radius:6px;margin-top:4px;padding:6px 0;}
    .pts-matches.open{display:block;}
    .pts-match-row{display:flex;justify-content:space-between;align-items:center;padding:4px 10px;font-size:11px;color:var(--muted);border-bottom:1px solid rgba(255,255,255,.03);}
    .pts-match-row:last-child{border-bottom:none;} .pts-match-row .m-title{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
    .pts-match-row .m-pts{color:var(--teal);font-weight:700;font-size:12px;min-width:36px;text-align:right;}
    .pts-match-row .m-mult{color:var(--gold);font-size:10px;margin:0 6px;}
    .pts-loading{text-align:center;color:var(--muted);padding:24px;font-size:13px;}
    /* Admin tab */
    .admin-match-row{padding:10px 0;border-bottom:1px solid rgba(255,255,255,.04);}
    .admin-match-row:last-child{border-bottom:none;}
    .admin-match-title{font-size:13px;font-weight:600;color:var(--text);margin-bottom:4px;}
    .admin-match-meta{font-size:11px;color:var(--muted);margin-bottom:6px;}
    .admin-url-row{display:flex;gap:6px;align-items:center;}
    .admin-url-input{flex:1;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);border-radius:6px;color:var(--text);font-size:11px;padding:5px 8px;font-family:monospace;}
    .admin-url-input:focus{outline:none;border-color:var(--teal);}
    .admin-save-btn{padding:5px 12px;background:rgba(0,212,170,.15);border:1px solid rgba(0,212,170,.3);border-radius:6px;color:var(--teal);font-size:11px;font-weight:700;cursor:pointer;white-space:nowrap;transition:all .15s;}
    .admin-save-btn:hover{background:rgba(0,212,170,.3);} .admin-save-btn:disabled{opacity:.4;cursor:not-allowed;}
    .admin-save-status{font-size:10px;margin-left:4px;} .admin-save-status.ok{color:var(--teal);} .admin-save-status.err{color:#FF6B6B;}
    .admin-url-current{font-size:10px;color:var(--dim);margin-top:3px;font-family:monospace;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
    .admin-filter{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px;}
    .admin-filter-btn{padding:4px 10px;border-radius:20px;border:1px solid rgba(255,255,255,.1);background:transparent;color:var(--muted);font-size:11px;cursor:pointer;transition:all .15s;}
    .admin-filter-btn.active{background:var(--gold);color:#07111F;border-color:var(--gold);font-weight:700;}
  </style>

function _buildCatalogue(){
  var map={};
  EMBEDDED_PLAYERS.forEach(function(p){map[p.id]=p;map[p.name.toLowerCase()]=p;});
  if(_players&&_players.players)_players.players.forEach(function(p){map[p.id]=p;map[p.name.toLowerCase()]=p;});
  return map;
}
function _allPlayers(){
  var seen={},out=[],src=(_players&&_players.players&&_players.players.length>0)?_players.players:EMBEDDED_PLAYERS;
  var merged=src.slice();
  if(_players&&_players.players&&_players.players.length>0){
    EMBEDDED_PLAYERS.forEach(function(ep){
      var found=false;
      for(var i=0;i<merged.length;i++){if(merged[i].id===ep.id||merged[i].name.toLowerCase()===ep.name.toLowerCase()){found=true;break;}}
      if(!found)merged.push(ep);
    });
  }
  merged.forEach(function(p){var k=p.name.toLowerCase();if(!seen[k]){seen[k]=true;out.push(p);}});
  out.sort(function(a,b){return a.name<b.name?-1:1;});
  return out;
}
function resolvePlayer(idOrName){
  if(!idOrName)return{name:"",role:"",team:"",price:0};
  var cat=_buildCatalogue();
  var p=cat[idOrName]||cat[String(idOrName).toLowerCase()];
  if(p)return p;
  var key=String(idOrName).toLowerCase(),all=_allPlayers();
  for(var i=0;i<all.length;i++){if(all[i].name&&all[i].name.toLowerCase().endsWith(key))return all[i];}
  return{name:String(idOrName),role:"",team:"",price:0};
}

// ─── ADMIN TAB (Cricbuzz URL management) ─────────────────────────────────────
function _buildAdminTab(){
  var h='<div class="card">';
  h+='<div class="user-header-bar" style="margin-bottom:14px">';
  h+='<h3 class="section-title" style="margin:0">\u2699\uFE0F Match URL Admin</h3>';
  h+='<button class="btn btn-ghost btn-sm" onclick="_adminMatches=null;_loadAdminMatches();if(_state)render(_state)">\u27F3 Refresh</button>';
  h+='</div>';
  h+='<p style="color:var(--muted);font-size:12px;margin-bottom:12px">Paste the Cricbuzz scorecard URL for each completed match, then click Save. The scraper will run automatically in the background.</p>';

  // Filter buttons
  h+='<div class="admin-filter">';
  [{v:"all",l:"All"},{v:"completed",l:"\uD83D\uDFE2 Completed"},{v:"upcoming",l:"\uD83D\uDD51 Upcoming"},{v:"no-id",l:"\u26A0 Missing IDs"}].forEach(function(f){
    h+='<button class="admin-filter-btn'+(_adminFilter===f.v?' active':'')
       +'" onclick="_adminFilter=\''+f.v+'\';if(_state)render(_state)">'+f.l+'</button>';
  });
  h+='</div>';

  if(!_adminMatches){
    return h+'<p style="color:var(--muted);font-size:13px">Loading matches\u2026</p></div>';
  }

  var list=_adminMatches.filter(function(m){
    if(_adminFilter==="completed")return m.status==="completed";
    if(_adminFilter==="upcoming")return m.status==="upcoming";
    if(_adminFilter==="no-id"){
      var u=m.scorecard_url||"";var last=u.split("/").pop();return !last||last==="00000"||!/[1-9]/.test(last);
    }
    return true;
  });

  if(list.length===0){return h+'<p style="color:var(--muted);font-size:13px">No matches match the filter.</p></div>';}

  list.forEach(function(m){
    var hasId=m.scorecard_url&&/[1-9]\d{4,}/.test(m.scorecard_url||"00000");
    var inputId="url-"+m.id,statusId="st-"+m.id;
    h+='<div class="admin-match-row">';
    h+='<div class="admin-match-title">'+esc(m.title||m.id)+'<span class="status-pill status-'+m.status+'">'+m.status+'</span>'+(hasId?'<span style="color:var(--teal);font-size:10px;margin-left:6px">\u2705 Has ID</span>':'<span style="color:#FF6B6B;font-size:10px;margin-left:6px">\u26A0 No ID</span>')+'</div>';
    h+='<div class="admin-match-meta">Match ID: '+esc(m.id)+' | Week '+m.week_no+'</div>';
    h+='<div class="admin-url-row">';
    h+='<input class="admin-url-input" id="'+inputId+'" type="url" placeholder="https://www.cricbuzz.com/live-cricket-scorecard/XXXXXX/..." value="'+esc(m.scorecard_url||'')+'">';
    h+='<button class="admin-save-btn" id="btn-'+m.id+'" onclick="_adminSaveUrl(\''+escAttr(m.id)+"','"+inputId+"','"+statusId+'\')" >Save &amp; Scrape</button>';
    h+='<span class="admin-save-status" id="'+statusId+'"></span>';
    h+='</div>';
    if(m.scorecard_url)h+='<div class="admin-url-current">Current: '+esc(m.scorecard_url)+'</div>';
    h+='</div>';
  });
  return h+'</div>';
}

// ─── RENDER ───────────────────────────────────────────────────────────────────

  if(!_username){
    html+=_buildLoginCard(memberNames);
    html+=_buildLeaderboardCard(_leaderboard);
    html+=_buildMembersCard(memberNames);
  } else {
    var ini=_initials(_username);
    html+='<div class="card"><div class="user-header-bar"><div class="user-header-left"><div class="user-avatar-large">'+esc(ini)+'</div><div><p class="label">Logged in as</p><p class="name">'+esc(_username)+'</p></div></div><div class="user-header-btns"><button class="btn-refresh" id="refresh-btn" onclick="_refreshData()" title="Refresh">\u27F3 Refresh</button><button class="btn btn-ghost btn-sm" onclick="logout()">Switch user</button></div></div><div id="refresh-status" class="refresh-status" style="margin-top:4px;text-align:right"></div></div>';
    html+='<div class="tabs">';
    [
      {id:"team",label:"This Week \uD83D\uDD12"},
      {id:"next",label:"Next Week \u270F\uFE0F"},
      {id:"history",label:"History \uD83D\uDCD6"},
      {id:"points",label:"Points \uD83D\uDCCA"},
      {id:"leaderboard",label:"Leaderboard"},
      {id:"matches",label:"Matches"},
      {id:"members",label:"Members"},
      {id:"admin",label:"Admin \u2699\uFE0F"},
    ].forEach(function(t){
      html+='<button class="tab-btn'+(_activeTab===t.id?' active':'')
            +'" onclick="switchTab(\''+t.id+'\')">'+ t.label+'</button>';
    });
    html+='</div>';
    if     (_activeTab==="team")        {html+=_buildThisWeekCard();html+=_buildDevTools();}
    else if(_activeTab==="next")        html+=_buildNextWeekCard();
    else if(_activeTab==="history")     html+=_buildHistoryTab();
    else if(_activeTab==="points")      html+=_buildPointsTab();
    else if(_activeTab==="leaderboard") html+=_buildLeaderboardCard(_leaderboard);
    else if(_activeTab==="matches")     html+=_buildMatchesCard(matches);
    else if(_activeTab==="members")     html+=_buildMembersCard(memberNames);
    else if(_activeTab==="admin")       html+=_buildAdminTab();
  }
  html+='</div>';

  if(_activeTab==="next"){var inp=document.getElementById("picker-search-input");if(inp){inp.focus();inp.selectionStart=inp.selectionEnd=inp.value.length;}}
}

function _bootstrap(){
  var savedUser=getSavedUsername();
  var stP=fetch("/api/state",{headers:{"Accept":"application/json"}}).then(function(r){if(!r.ok)throw new Error("HTTP "+r.status);return r.json();});
  var hP=(savedUser&&window.IplApi)?window.IplApi.getHistory(savedUser).catch(function(){return null;}):Promise.resolve(null);
  var plP=(!_players&&window.IplApi)?window.IplApi.getPlayers().catch(function(){return null;}):Promise.resolve(null);
  var lbP=fetch("/api/leaderboard",{headers:{"Accept":"application/json"}}).then(function(r){return r.ok?r.json():null;}).catch(function(){return null;});
  var wkP=fetch("/api/current-week",{headers:{"Accept":"application/json"}}).then(function(r){return r.ok?r.json():null;}).catch(function(){return null;});
  stP.then(function(state){
    if(!_username){if(savedUser&&state.members&&state.members[savedUser])_username=savedUser;else if(savedUser)clearUsername();}
    render(state);
  }).catch(function(err){
    console.error("[IPL] bootstrap:",err);
    showErrorBanner("Could not reach server \u2014 retrying\u2026");
  });
  Promise.all([stP,hP]).then(function(results){
    var state=results[0],history=results[1];
    if(!state)return;
    if(history&&history.ok){
      _historyData=history;_currentWeek=history.current_week;
      if(_nwDraft.team.length===0){
        var cur=_getCurrentWeekRow(history);
        if(cur){var nw=cur.next_week,tw=cur.this_week;if(nw&&nw.team&&nw.team.length>0)_nwDraft={team:nw.team.slice(),cap:nw.cap,vc:nw.vc};else if(tw&&tw.team&&tw.team.length>0)_nwDraft={team:tw.team.slice(),cap:tw.cap,vc:tw.vc};}
      }
    }
    render(state);
    // Auto-load points if on points tab
    if(_activeTab==="points"&&_username&&!_ptsData)_loadPoints();
  }).catch(function(){});
  plP.then(function(pl){if(pl&&pl.ok!==false){setPlayers(pl);window.dispatchEvent(new CustomEvent("ipl:players-updated",{detail:pl}));}});
  lbP.then(function(lb){if(lb){var norm=window.normaliseLeaderboard?window.normaliseLeaderboard(lb):lb;renderLeaderboard(norm);}});
  wkP.then(function(d){if(d&&d.ok&&d.week_no!==_currentWeek){_currentWeek=d.week_no;if(_state)render(_state);}});
}

var _glueReady=false;
window.addEventListener("ipl:ready",function(){_glueReady=true;_bootstrap();});
setTimeout(function(){if(!_glueReady&&window.IplApi){_glueReady=true;_bootstrap();}},50);

window.addEventListener("ipl:state-updated",function(e){
  var state=e.detail;
  if(!state||typeof state.members!=="object")return;
  if(!_username){var saved=getSavedUsername();if(saved&&state.members[saved])_username=saved;else if(saved&&!state.members[saved])clearUsername();}
  render(state);
});
window.addEventListener("ipl:leaderboard-updated",function(e){renderLeaderboard(e.detail);});
window.addEventListener("ipl:players-updated",function(e){setPlayers(e.detail);});
window.addEventListener("ipl:error",function(e){var err=e.detail;if(err&&err.status&&err.status<500)return;showErrorBanner(err&&err.serverMessage?err.serverMessage:"Server error \u2014 retrying in 60 s\u2026");});
window.addEventListener("ipl:saved",function(){_bootstrap();});
</script>
<script src="/static/ipl_glue.js"></script>
</body>
</html>
