<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#07111F" />
  <link rel="manifest" href="/manifest.json" />
  <title>IPL Fantasy 2026</title>
  <link rel="stylesheet" href="/static/style.css?v=1.0">
</head>
<body>
<div id="app-loading"><div class="logo">🏏</div><h1>IPL Fantasy 2026</h1><div class="spinner"></div><p>Loading your league…</p></div>
<div id="error-banner" role="alert"></div>
<div id="app"></div>
<script>
"use strict";
var BUDGET_TOTAL=100.0,XI_SIZE=11;

// ─── GLOBAL STATE ─────────────────────────────────────────────────────────────
var _state=null,_leaderboard=null,_players=null,_username=null;
var _isAdmin=false,_mustChange=false;
var _activeTab="match-centre",_currentWeek=1,_historyData=null,_historyViewWk=null;
var _nwDraft={team:[],cap:null,vc:null};
var _pickerSearch="",_pickerRole="All",_pickerTeam="All",_pickerSort="season";
var _pickerNotice=null,_pickerNoticeTimer=null;
var _adminMatches=null,_adminFilter="all";
var _adminMembersList=null;
var members={},matches=[];
var $app=document.getElementById("app"),$loading=document.getElementById("app-loading"),$errorBanner=document.getElementById("error-banner");

function _buildCatalogue(){
  var map={};
  if(_players&&_players.players)_players.players.forEach(function(p){map[p.id]=p;map[p.name.toLowerCase()]=p;});
  return map;
}
function _allPlayers(){
  var seen={},out=[];
  var src=(_players&&_players.players&&_players.players.length>0)?_players.players:[];
  src.forEach(function(p){var k=p.name.toLowerCase();if(!seen[k]){seen[k]=true;out.push(p);}});
  out.sort(function(a,b){return a.name<b.name?-1:1;});
  return out;
}
function resolvePlayer(idOrName){
  if(!idOrName)return{name:"",role:"",team:"",price:0};
  var cat=_buildCatalogue();
  var p=cat[idOrName]||cat[String(idOrName).toLowerCase()];
  if(p)return p;
  var key=String(idOrName).toLowerCase(),all=_allPlayers();
  for(var i=0;i<all.length;i++){if(all[i].name&&all[i].name.toLowerCase().endsWith(key))return all[i];}
  return{name:String(idOrName),role:"",team:"",price:0};
}
function _teamCost(arr){var t=0;arr.forEach(function(id){var p=resolvePlayer(id);t+=(p.price||0);});return Math.round(t*10)/10;}
function _remaining(){return Math.round((BUDGET_TOTAL-_teamCost(_nwDraft.team))*10)/10;}
var LS_KEY="ipl_username";
function getSavedUsername(){try{return localStorage.getItem(LS_KEY)||null;}catch(e){return null;}}
function saveUsername(n){try{localStorage.setItem(LS_KEY,n);}catch(e){}}
function clearUsername(){try{localStorage.removeItem(LS_KEY);}catch(e){}}
function esc(s){return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");}
function escAttr(s){return String(s).replace(/\\/g,"\\\\").replace(/'/g,"\\'");}
function hideLoading(){if($loading&&!$loading.classList.contains("hidden")){$loading.classList.add("hidden");setTimeout(function(){if($loading)$loading.remove();},450);}}
function showErrorBanner(msg){if(!$errorBanner)return;$errorBanner.textContent="\u26a0\uFE0F  "+(msg||"Server error \u2014 retrying\u2026");$errorBanner.classList.add("visible");}
function hideErrorBanner(){if($errorBanner)$errorBanner.classList.remove("visible");}
function _avClass(team){
  if(!team)return"";
  switch(team.toLowerCase()){
    case"rcb":return"av-rcb";case"srh":return"av-srh";case"mi":return"av-mi";case"kkr":return"av-kkr";
    case"csk":return"av-csk";case"rr":return"av-rr";case"dc":return"av-dc";case"pbks":return"av-pbks";
    case"lsg":return"av-lsg";case"gt":return"av-gt";default:return"";
  }
}
function _roleBadge(role){
  if(!role)return"";
  var m={WK:"badge-wk",BAT:"badge-bat",AR:"badge-ar",BOWL:"badge-bowl"},cls=m[role]||"";
  return cls?'<span class="badge '+cls+'">'+esc(role)+'</span>':"";
}
function _initials(name){
  if(!name)return"?";
  var parts=name.split(" ");
  if(parts.length===1)return name.substring(0,2).toUpperCase();
  return(parts[0][0]+parts[parts.length-1][0]).toUpperCase();
}

// ─── SESSION ─────────────────────────────────────────────────────────────────
// _establishSession is called after a successful /api/login or /api/register
// (or whoami on bootstrap). It sets globals and triggers initial loads.
function _establishSession(name, isAdmin, mustChange){
  _username=name;_isAdmin=!!isAdmin;_mustChange=!!mustChange;
  _activeTab="match-centre";_historyData=null;_historyViewWk=null;
  _adminMatches=null;_adminMembersList=null;
  window.dispatchEvent(new CustomEvent('ipl:state-updated'));
  saveUsername(name);_loadHistory();
  if(_state)render(_state);
  if(_mustChange) _showResetPasscodeModal(true);
  return true;
}
// attemptLogin(name) is what every member-chip / pill click calls. It opens
// the passcode prompt. Form submits route to IplApi.login → _establishSession.
function attemptLogin(name){
  if(!name)return false;
  _showPasscodePromptModal(name);
  return true;
}
function logout(){
  if(window.IplApi&&IplApi.logoutClearToken)IplApi.logoutClearToken();
  _username=null;_isAdmin=false;_mustChange=false;
  clearUsername();_historyData=null;_historyViewWk=null;
  _nwDraft={team:[],cap:null,vc:null};_adminMatches=null;_adminMembersList=null;
  if(_state)render(_state);
}
function switchTab(tab){
  _activeTab=tab;
  if(tab==="admin")_loadAdminMatches();
  if(_state)render(_state);
}

// ─── HISTORY ────────────────────────────────────────────────────────────────
function _loadHistory(){
  if(!_username||!window.IplApi)return;
  window.IplApi.getHistory(_username).then(function(data){
    if(!data||!data.ok)return;
    _historyData=data;_currentWeek=data.current_week;
    var cur=_getCurrentWeekRow(data);
    if(cur){
      var nw=cur.next_week,tw=cur.this_week;
      if(nw&&nw.team&&nw.team.length>0)_nwDraft={team:nw.team.slice(),cap:nw.cap,vc:nw.vc};
      else if(tw&&tw.team&&tw.team.length>0)_nwDraft={team:tw.team.slice(),cap:tw.cap,vc:tw.vc};
    }
    if(_state)render(_state);
  }).catch(function(e){console.error("[IPL] history:",e);});
}

// ─── ADMIN MATCHES ────────────────────────────────────────────────────────────
function _loadAdminMatches(){
  fetch("/api/matches-status")
    .then(function(r){return r.ok?r.json():null;})
    .then(function(d){
      if(d&&d.ok){_adminMatches=d.matches;}
      if(_state&&_activeTab==="admin")render(_state);
    }).catch(function(){});
}
function _adminSaveUrl(matchId,inputId,statusId){
  var inp=document.getElementById(inputId);
  var statusEl=document.getElementById(statusId);
  var url=inp?inp.value.trim():"";
  if(!url){if(statusEl){statusEl.textContent="Enter a URL first";statusEl.className="admin-save-status err";}return;}
  var btn=document.getElementById("btn-"+matchId);
  if(btn)btn.disabled=true;
  if(statusEl){statusEl.textContent="Saving\u2026";statusEl.className="admin-save-status";}
  fetch("/api/update-match-url",{
    method:"POST",headers:{"Content-Type":"application/json"},
    body:JSON.stringify({match_id:matchId,url:url})
  }).then(function(r){return r.json();})
  .then(function(d){
    if(btn)btn.disabled=false;
    if(d&&d.ok){
      if(statusEl){statusEl.textContent="\u2705 Saved! Scraping in background\u2026";statusEl.className="admin-save-status ok";}
      _adminMatches=null;
      setTimeout(function(){_loadAdminMatches();if(_state&&_activeTab==="admin")render(_state);},3000);
    } else {
      if(statusEl){statusEl.textContent="\u274c "+(d.error||"Error");statusEl.className="admin-save-status err";}
    }
  }).catch(function(){
    if(btn)btn.disabled=false;
    if(statusEl){statusEl.textContent="\u274c Network error";statusEl.className="admin-save-status err";}
  });
}

// ─── MUTATIONS ────────────────────────────────────────────────────────────────
function _getCurrentWeekRow(hd){
  var d=hd||_historyData;if(!d||!d.weeks)return null;
  for(var i=d.weeks.length-1;i>=0;i--){if(d.weeks[i].is_current)return d.weeks[i];}
  return d.weeks[d.weeks.length-1]||null;
}
function _getThisWeekData(){
  if(_state&&_username&&_state.members&&_state.members[_username]){
    var tw=_state.members[_username].this_week;
    if(tw&&tw.team&&tw.team.length>0)return tw;
  }
  var cur=_getCurrentWeekRow();
  if(cur&&cur.this_week&&cur.this_week.team&&cur.this_week.team.length>0)return cur.this_week;
  return null;
}
function _selectHistoryWeek(wkNo){_historyViewWk=(wkNo===_currentWeek)?null:wkNo;if(_state)render(_state);}
function _nwSetCap(id){_nwDraft.cap=(_nwDraft.cap===id)?null:id;_nwDraft.vc=(_nwDraft.vc===id)?null:_nwDraft.vc;if(_state)render(_state);}
function _nwSetVc(id){_nwDraft.vc=(_nwDraft.vc===id)?null:id;_nwDraft.cap=(_nwDraft.cap===id)?null:_nwDraft.cap;if(_state)render(_state);}
function _nwRemove(id){_nwDraft.team=_nwDraft.team.filter(function(x){return x!==id;});if(_nwDraft.cap===id)_nwDraft.cap=null;if(_nwDraft.vc===id)_nwDraft.vc=null;if(_state)render(_state);}
function _nwToggle(id){
  var idx=_nwDraft.team.indexOf(id);
  if(idx!==-1){_nwRemove(id);return;}
  if(_nwDraft.team.length>=XI_SIZE)return;
  var p=resolvePlayer(id),cost=_teamCost(_nwDraft.team)+(p.price||0);
  if(cost>BUDGET_TOTAL)return;
  _nwDraft.team.push(id);
  if(_state)render(_state);
}
function _nwSave(){
  if(!_username)return;
  if(_nwDraft.team.length!==XI_SIZE){alert("Select exactly 11 players first.");return;}
  var btn=document.getElementById("nw-save-btn"),msg=document.getElementById("nw-save-msg");
  if(btn){btn.disabled=true;btn.textContent="Saving\u2026";}
  if(msg){msg.textContent="";msg.className="save-status";}
  window.IplApi.saveNextWeek(_username,_nwDraft)
    .then(function(){
      if(btn){btn.disabled=false;btn.textContent="Save Draft";}
      if(msg){msg.textContent="\u2713 Saved!";msg.className="save-status ok";}
      window.dispatchEvent(new CustomEvent("ipl:saved"));
      setTimeout(function(){if(msg)msg.textContent="";},3000);
    }).catch(function(e){
      if(btn){btn.disabled=false;btn.textContent="Save Draft";}
      if(msg){msg.textContent="\u2717 "+(e.serverMessage||e.message);msg.className="save-status err";}
    });
}
function _pickerSetRole(r){_pickerRole=r;if(_state)render(_state);}
function _pickerSetTeam(t){_pickerTeam=t;if(_state)render(_state);}
function _pickerShowNotice(msg,type){
  _pickerNotice={msg:msg,type:type||"info"};
  if(_pickerNoticeTimer)clearTimeout(_pickerNoticeTimer);
  _pickerNoticeTimer=setTimeout(function(){_pickerNotice=null;if(_state&&_activeTab==="next")render(_state);},2800);
  if(_state&&_activeTab==="next")render(_state);
}
function _pickerRowClick(id){
  if(!id)return;
  var p=resolvePlayer(id);
  var nm=p.name||id;
  if(_nwDraft.team.indexOf(id)!==-1){
    _pickerShowNotice(nm+" is already in your XI","info");
    return;
  }
  if(_nwDraft.team.length>=XI_SIZE){
    _showSwapModal(id);
    return;
  }
  var cost=_teamCost(_nwDraft.team)+(p.price||0);
  if(cost>BUDGET_TOTAL+0.001){
    _pickerShowNotice("Over budget — free up "+((cost-BUDGET_TOTAL).toFixed(1))+" CR first","warn");
    return;
  }
  _nwToggle(id);
}

function _doStateRefresh(onDone){
  var stP=fetch("/api/state",{headers:{"Accept":"application/json","Cache-Control":"no-cache"}}).then(function(r){return r.ok?r.json():null;}).catch(function(){return null;});
  var lbP=fetch("/api/leaderboard",{headers:{"Accept":"application/json"}}).then(function(r){return r.ok?r.json():null;}).catch(function(){return null;});
  var hP=(_username&&window.IplApi)?window.IplApi.getHistory(_username).catch(function(){return null;}):Promise.resolve(null);
  Promise.all([stP,lbP,hP]).then(function(results){
    var state=results[0],lb=results[1],history=results[2];
    if(state){
      if(history&&history.ok){_historyData=history;_currentWeek=history.current_week;}
      if(lb){_leaderboard=window.normaliseLeaderboard?window.normaliseLeaderboard(lb):lb;}
      window.dispatchEvent(new CustomEvent('ipl:state-updated'));
      render(state);
    }
    if(onDone)onDone(!!state);
  });
}
function _refreshData(){
  var btn=document.getElementById("refresh-btn"),msg=document.getElementById("refresh-status");
  if(btn){btn.disabled=true;btn.innerHTML='<span class="spin">\u27F3</span> Syncing\u2026';}
  if(msg){msg.textContent="\u23F3 Discovering new matches & scraping data\u2026";msg.className="refresh-status";}
  if(window.IplPolling)window.IplPolling.stop();

  // Step 1: Trigger background discovery + scrape
  fetch("/api/sync-now",{method:"POST",headers:{"Content-Type":"application/json"},body:"{}"})
    .then(function(r){return r.ok?r.json():null;})
    .catch(function(){return null;})
    .then(function(syncResp){
      var syncOk=syncResp&&syncResp.ok;
      if(msg){
        msg.textContent=syncOk
          ? "\u23F3 Scraping in background (~60s) \u2014 refreshing data now\u2026"
          : "\u26A0 Sync unavailable \u2014 refreshing cached data\u2026";
        msg.className="refresh-status";
      }

      // Step 2: Immediate state refresh (picks up existing data)
      _doStateRefresh(function(ok){
        var ts=new Date().toLocaleTimeString([],{hour:"2-digit",minute:"2-digit"});
        if(btn){btn.disabled=false;btn.innerHTML="\u27F3 Refresh";}
        if(ok){
          if(msg){msg.textContent=syncOk?"\u2713 "+ts+" \u2014 scraping continues in background":"\u2713 Updated "+ts;msg.className="refresh-status ok";}
        } else {
          if(msg){msg.textContent="\u2717 Could not reach server";msg.className="refresh-status err";}
        }
        if(window.IplPolling)window.IplPolling.start();

        // Step 3: Auto-refresh state again after 75s to pick up scraped data
        if(syncOk){
          setTimeout(function(){
            _doStateRefresh(function(ok2){
              if(ok2){
                var ts2=new Date().toLocaleTimeString([],{hour:"2-digit",minute:"2-digit"});
                var m2=document.getElementById("refresh-status");
                if(m2){m2.textContent="\u2713 Sync complete "+ts2;m2.className="refresh-status ok";}
              }
            });
          }, 75000);
        }
      });
    });
}
function _simulateRollover(){
  var btn=document.getElementById("rollover-btn"),res=document.getElementById("rollover-result");
  if(btn){btn.disabled=true;btn.textContent="Running\u2026";}
  if(res)res.textContent="";
  window.IplApi.rollover(true).then(function(data){
    if(btn){btn.disabled=false;btn.textContent="\u25B6 Simulate Monday 14:00 UTC Rollover";}
    if(res){
      if(data&&data.rolled){res.textContent="\u2713 Done! New week: W"+(data.new_week_no||"?");res.style.color="var(--teal)";}
      else{res.textContent="No-op: "+(data&&data.reason?data.reason:"already rolled");res.style.color="var(--muted)";}
    }
    _historyData=null;_nwDraft={team:[],cap:null,vc:null};
    window.dispatchEvent(new CustomEvent("ipl:saved"));_loadHistory();
  }).catch(function(e){
    if(btn){btn.disabled=false;btn.textContent="\u25B6 Simulate Monday 14:00 UTC Rollover";}
    if(res){res.textContent="\u2717 Error: "+(e.serverMessage||e.message);res.style.color="#FF6B6B";}
  });
}

// ─── XI CARD BUILDERS ──────────────────────────────────────────────────────────
function _buildXiGrid(teamArr,capId,vcId){
  if(!teamArr||teamArr.length===0)return'<p class="empty">No XI recorded.</p>';
  var h='<div class="xi-grid">';
  teamArr.forEach(function(id){
    var p=resolvePlayer(id),nm=p.name||id,iC=(id===capId),iV=(id===vcId);
    var cls="xi-card"+(iC?" is-cap":iV?" is-vc":"");
    var avC=_avClass(p.team),sub=[p.role,p.team].filter(Boolean).join(" \u00B7 ");
    var bdg=iC?'<span class="badge badge-c">C</span>':iV?'<span class="badge badge-vc">VC</span>':'';
    h+='<div class="'+cls+'">'+'<div class="xi-avatar '+avC+'">'+esc(_initials(nm))+'</div>'+'<div class="xi-info"><div class="xi-name">'+esc(nm)+'</div>'+(sub?'<div class="xi-sub">'+esc(sub)+'</div>':'')+'</div>'+(bdg?'<div class="xi-badge-wrap">'+bdg+'</div>':'')+'</div>';
  });
  return h+'</div>';
}
function _buildNwSquad(){
  var team=_nwDraft.team,cap=_nwDraft.cap,vc=_nwDraft.vc;
  var h='<div class="nw-squad-label">YOUR DRAFT XI <span style="font-size:10px;color:var(--muted);font-weight:400">\u00B7 '+team.length+'/'+XI_SIZE+' selected</span></div>';
  h+='<div class="nw-squad">';
  team.forEach(function(id){
    var p=resolvePlayer(id),nm=p.name||id,iC=(id===cap),iV=(id===vc);
    var cls="nw-player-row"+(iC?" is-cap":iV?" is-vc":"");
    var avC=_avClass(p.team);
    var pts=p.season_pts!=null?p.season_pts:"";
    h+='<div class="'+cls+'">';
    h+='<div class="xi-avatar '+avC+'">'+esc(_initials(nm))+'</div>';
    h+='<div class="nw-player-info"><div class="nw-player-name">'+esc(nm)+'</div>';
    h+='<div class="nw-player-sub">'+_roleBadge(p.role)+(p.team?' '+esc(p.team):'')+(p.price?' \u00B7 '+p.price.toFixed(1)+'CR':'')+'</div></div>';
    h+='<div class="nw-player-pts">'+pts+'</div>';
    h+='<div class="nw-player-actions">';
    h+='<button class="ecap-btn'+(iC?' on':'')+'" onclick="_nwSetCap(\''+escAttr(id)+'\')">C</button>';
    h+='<button class="evc-btn'+(iV?' on':'')+'" onclick="_nwSetVc(\''+escAttr(id)+'\')">V</button>';
    h+='<button class="erem-btn" onclick="_nwRemove(\''+escAttr(id)+'\')">\xd7</button>';
    h+='</div></div>';
  });
  for(var i=team.length;i<XI_SIZE;i++){
    h+='<div class="nw-add-slot">+ pick a player</div>';
  }
  h+='</div>';
  return h;
}
function _buildBudgetBar(){
  var team=_nwDraft.team,spent=_teamCost(team),rem=Math.round((BUDGET_TOTAL-spent)*10)/10;
  var pct=Math.min(100,(spent/BUDGET_TOTAL)*100);
  var fillBg=rem<0?"#FF6B6B":rem<10?"var(--gold)":"var(--teal)";
  var remCls=rem<0?"over":rem<10?"warn":"ok";
  var roles={WK:0,BAT:0,AR:0,BOWL:0};
  team.forEach(function(id){var r=(resolvePlayer(id).role||"BAT").toUpperCase();if(roles[r]!==undefined)roles[r]++;});
  var count=team.length,canSave=count===XI_SIZE&&rem>=-0.001;
  var saveTitle=!canSave?(count<XI_SIZE?"Select all "+XI_SIZE+" players first":"Over 100 CR budget"):"";
  var h='<div class="nw-budget-bar">';
  h+='<div class="nw-budget-main"><div class="nw-budget-lbl">Budget</div><div class="nw-budget-amt '+remCls+'">'+rem.toFixed(1)+'<span class="nw-budget-denom"> / '+BUDGET_TOTAL.toFixed(0)+'CR</span></div></div>';
  h+='<div class="nw-budget-track"><div class="nw-budget-fill" style="width:'+pct+'%;background:'+fillBg+'"></div></div>';
  h+='<div class="nw-role-pills">';
  ['WK','BAT','AR','BOWL'].forEach(function(r){h+='<span class="nw-role-ct"><span class="nw-role-n">'+roles[r]+'</span> '+r+'</span>';});
  h+='</div>';
  h+='<span class="nw-slot-badge">'+count+' / '+XI_SIZE+'</span>';
  h+='<button id="nw-save-btn" class="btn btn-gold" onclick="_nwSave()"'+(!canSave?' disabled title="'+esc(saveTitle)+'"':'')+'>Save Draft</button>';
  h+='</div>';
  h+='<span id="nw-save-msg" class="save-status" style="font-size:11px;display:block;text-align:right;min-height:14px;margin-bottom:4px"></span>';
  return h;
}
function _buildPicker(){
  var allP=_allPlayers(),teams=[],ts={};
  allP.forEach(function(p){if(p.team&&!ts[p.team]){ts[p.team]=true;teams.push(p.team);}});
  teams.sort();
  var q=_pickerSearch.toLowerCase().trim();
  var filtered=allP.filter(function(p){
    if(_pickerRole!=="All"&&p.role!==_pickerRole)return false;
    if(_pickerTeam!=="All"&&p.team!==_pickerTeam)return false;
    if(q&&(p.name+" "+(p.team||"")).toLowerCase().indexOf(q)===-1)return false;
    return true;
  });
  var sv=_pickerSort||"season";
  filtered.sort(function(a,b){
    if(sv==="price")return(b.price||0)-(a.price||0);
    if(sv==="name")return a.name<b.name?-1:1;
    return(b.season_pts||0)-(a.season_pts||0);
  });
  var selSet={};_nwDraft.team.forEach(function(n){selSet[n]=true;});
  var xi_full=_nwDraft.team.length>=XI_SIZE,rem=_remaining();
  var h='<div class="picker-shell"><div class="picker-toolbar">';
  if(_pickerNotice){
    var ncolor=_pickerNotice.type==="warn"?"#FF6B6B":"var(--teal)";
    var nbg=_pickerNotice.type==="warn"?"rgba(255,107,107,.12)":"rgba(46,204,170,.12)";
    h+='<div class="picker-notice" style="margin-bottom:8px;padding:8px 10px;border-radius:8px;background:'+nbg+';border:1px solid '+ncolor+';color:'+ncolor+';font-size:12px;font-weight:600">'+esc(_pickerNotice.msg)+'</div>';
  }
  h+='<div class="picker-top-bar"><div class="picker-search" style="flex:1;margin-bottom:0"><span style="color:var(--muted);font-size:13px">\uD83D\uDD0D</span><input id="picker-search-input" type="text" placeholder="Search players\u2026" value="'+esc(_pickerSearch)+'" oninput="_pickerSearch=this.value;if(_state)render(_state)"></div>';
  h+='<span class="picker-count-badge">'+filtered.length+'</span>';
  h+='<select class="picker-sort-sel" onchange="_pickerSort=this.value;if(_state)render(_state)">';
  [{v:"season",l:"Season pts"},{v:"price",l:"Price"},{v:"name",l:"Name"}].forEach(function(o){h+='<option value="'+o.v+'"'+(sv===o.v?" selected":"")+'>Sort: '+o.l+'</option>';});
  h+='</select></div>';
  h+='<div class="picker-filters" style="margin-top:8px">';

// \u2500\u2500\u2500 ADMIN TAB \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500
function _buildAdminTab(){
  var h=_buildAdminPasscodesCard();
  h+='<div class="card">';
  h+='<div class="user-header-bar" style="margin-bottom:14px">';
  h+='<h3 class="section-title" style="margin:0">\u2699\uFE0F Match URL Admin</h3>';
  h+='<button class="btn btn-ghost btn-sm" onclick="_adminMatches=null;_loadAdminMatches();if(_state)render(_state)">\u27F3 Refresh</button>';
  h+='</div>';
  h+='<p style="color:var(--muted);font-size:12px;margin-bottom:12px">Paste the Cricbuzz scorecard URL for each completed match, then click Save. The scraper will run automatically in the background.</p>';
  h+='<div class="admin-filter">';
  [{v:"all",l:"All"},{v:"completed",l:"\uD83D\uDFE2 Completed"},{v:"upcoming",l:"\uD83D\uDD51 Upcoming"},{v:"no-id",l:"\u26A0 Missing IDs"}].forEach(function(f){
    h+='<button class="admin-filter-btn'+(_adminFilter===f.v?' active':'')+'" onclick="_adminFilter=\''+f.v+'\';if(_state)render(_state)">'+f.l+'</button>';
  });
  h+='</div>';
  if(!_adminMatches){return h+'<p style="color:var(--muted);font-size:13px">Loading matches\u2026</p></div>';}
  var list=_adminMatches.filter(function(m){
    if(_adminFilter==="completed")return m.status==="completed";
    if(_adminFilter==="upcoming")return m.status==="upcoming";
    if(_adminFilter==="no-id"){var u=m.scorecard_url||"";var last=u.split("/").pop();return !last||last==="00000"||!/[1-9]/.test(last);}
    return true;
  });
  if(list.length===0){return h+'<p style="color:var(--muted);font-size:13px">No matches match the filter.</p></div>';}
  // Build Cricbuzz-ID \u2192 [match_ids] map to detect duplicates across the FULL list (not filtered)
  var _cbIdMap={};
  _adminMatches.forEach(function(mx){
    var u=mx.scorecard_url||'';var cb=u.replace(/.*\//,'');
    if(cb&&cb!=='00000'&&/^[1-9]\d{4,}$/.test(cb)){
      if(!_cbIdMap[cb])_cbIdMap[cb]=[];
      _cbIdMap[cb].push(mx.id);
    }
  });
  list.forEach(function(m){
    var hasId=m.scorecard_url&&/[1-9]\d{4,}/.test(m.scorecard_url||"00000");
    // Determine the Cricbuzz numeric ID from the URL for duplicate check
    var cbId=(m.scorecard_url||'').replace(/.*\//,'');
    var isDup=cbId&&cbId!=='00000'&&_cbIdMap[cbId]&&_cbIdMap[cbId].length>1;
    var dupWith=isDup?_cbIdMap[cbId].filter(function(x){return x!==m.id;}):[];
    // Build a user-friendly display title always including teams
    var teams=[];try{teams=JSON.parse(m.teams_json||'[]');}catch(e){}
    // Fallback: extract teams from title "SRH vs RCB, 1st Match" if teams_json empty
    if(teams.length<2&&m.title){var _tm=m.title.match(/^([A-Z]+)\s+vs\s+([A-Z]+)/);if(_tm)teams=[_tm[1],_tm[2]];}
    // Extract the trailing match number (e.g. "ipl26_m51" -> 51).
    // The earlier `replace(/\D/g,'')` approach glued the year prefix to the
    // number — "ipl26_m51" became "2651". Anchored regex captures only the m.. part.
    var _mn=(m.id||'').match(/_m(\d+)$/);
    var matchNo=_mn?parseInt(_mn[1],10):0;
    var teamsStr=teams.length>=2?(teams[0]+' vs '+teams[1]):'';
    var displayTitle='M'+matchNo+(teamsStr?' \u00B7 '+teamsStr:'');
    // Sub-label: date + week
    var subLabel='Week '+m.week_no+(m.date_label?' \u00B7 '+m.date_label:'');
    var inputId="url-"+m.id,statusId="st-"+m.id;
    h+='<div class="admin-match-row'+(isDup?' admin-match-dup':'')+'">';
    // Title row
    h+='<div class="admin-match-title">'+esc(displayTitle)
      +'<span class="status-pill status-'+m.status+'">'+m.status+'</span>'
      +(hasId?'<span style="color:var(--teal);font-size:10px;margin-left:6px">\u2705 Has ID</span>':'<span style="color:#FF6B6B;font-size:10px;margin-left:6px">\u26A0 No ID</span>')
      +(isDup?'<span style="color:#FF6B6B;font-size:10px;margin-left:6px">\u26A0 Duplicate URL \u2014 also on '+esc(dupWith.join(', '))+'</span>':'')
      +'</div>';
    // Meta row: internal ID + week + date
    h+='<div class="admin-match-meta">'+esc(m.id)+' \u00B7 '+esc(subLabel)+'</div>';
    h+='<div class="admin-url-row">';

// ─── PASSCODE PROMPT MODAL ────────────────────────────────────────────────────
// Opens when an existing member clicks their chip / pill. Asks for the 4-digit
// passcode, calls IplApi.login, and either establishes the session or shows
// an inline error and clears the boxes.
function _showPasscodePromptModal(name){
  var existing=document.getElementById('passcode-prompt-modal');
  if(existing)existing.remove();
  var h='<div id="passcode-prompt-modal" onclick="if(event.target.id===\'passcode-prompt-modal\')_closePasscodePrompt()" style="position:fixed;inset:0;z-index:999;background:rgba(7,17,31,.88);display:flex;align-items:flex-end;justify-content:center;">';
  h+='<div style="background:var(--surface);border:1px solid var(--border);border-radius:16px 16px 0 0;width:100%;max-width:420px;padding:18px 16px 24px;">';
  h+='<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;"><div style="font-size:15px;font-weight:800;color:var(--gold);">🔒 Welcome back, '+esc(name)+'</div><button onclick="_closePasscodePrompt()" style="background:transparent;border:none;color:var(--muted);font-size:22px;line-height:1;cursor:pointer;padding:0 4px;">×</button></div>';
  h+='<div style="font-size:12px;color:var(--muted);margin-bottom:14px;">Enter your 4-digit passcode to sign in.</div>';
  h+='<input id="passcode-input" type="tel" inputmode="numeric" pattern="\\d{4}" maxlength="4" autocomplete="off" placeholder="••••" style="width:100%;font-size:24px;letter-spacing:14px;text-align:center;padding:14px;background:rgba(255,255,255,.06);border:1px solid var(--border);border-radius:10px;color:var(--text);font-weight:700;">';
  h+='<div id="passcode-error" style="color:#FF6B6B;font-size:12px;min-height:16px;margin-top:6px;text-align:center;"></div>';
  h+='<button id="passcode-submit-btn" onclick="_submitPasscode(\''+escAttr(name)+'\')" class="btn btn-teal" style="margin-top:8px;width:100%;padding:12px;">Sign in</button>';
  h+='</div></div>';
  var el=document.createElement('div');el.innerHTML=h;document.body.appendChild(el.firstChild);
  setTimeout(function(){
    var inp=document.getElementById('passcode-input');
    if(inp){
      inp.focus();
      inp.addEventListener('keydown',function(e){if(e.key==='Enter'){_submitPasscode(name);}});
      inp.addEventListener('input',function(){
        // Auto-submit when user types the 4th digit. Less friction than tapping Sign in.
        if(inp.value.replace(/\D/g,'').length===4){
          inp.value=inp.value.replace(/\D/g,'');
          _submitPasscode(name);
        }
      });
    }
  },50);
}
function _closePasscodePrompt(){var m=document.getElementById('passcode-prompt-modal');if(m)m.remove();}
function _submitPasscode(name){
  var inp=document.getElementById('passcode-input');
  var errEl=document.getElementById('passcode-error');
  var btn=document.getElementById('passcode-submit-btn');
  var pc=inp?inp.value.trim():'';
  if(!/^\d{4}$/.test(pc)){
    if(errEl)errEl.textContent='Passcode must be exactly 4 digits.';
    if(inp){inp.value='';inp.focus();}
    return;
  }
  if(btn){btn.disabled=true;btn.textContent='Signing in…';}
  if(errEl)errEl.textContent='';
  window.IplApi.login(name,pc).then(function(d){
    if(!d||!d.ok){throw new Error('login failed');}
    _closePasscodePrompt();
    _establishSession(d.name,d.is_admin,d.must_change);
  }).catch(function(e){
    var msg=(e&&e.serverMessage)?e.serverMessage:'Wrong passcode';
    if(errEl)errEl.textContent='⚠ '+msg;
    if(inp){inp.value='';inp.focus();}
    if(btn){btn.disabled=false;btn.textContent='Sign in';}
  });
}

function _closeResetPasscode(){var m=document.getElementById('reset-passcode-modal');if(m)m.remove();}
function _submitResetPasscode(forced){
  var n=document.getElementById('rp-new'),c=document.getElementById('rp-confirm');
  var errEl=document.getElementById('rp-error'),btn=document.getElementById('rp-submit-btn');
  var nv=n?n.value.trim():'',cv=c?c.value.trim():'';
  if(!/^\d{4}$/.test(nv)){if(errEl)errEl.textContent='Passcode must be exactly 4 digits.';if(n)n.focus();return;}
  if(nv!==cv){if(errEl)errEl.textContent='Passcodes do not match.';if(c){c.value='';c.focus();}return;}
  if(btn){btn.disabled=true;btn.textContent='Saving…';}
  if(errEl)errEl.textContent='';
  window.IplApi.changePasscode(nv).then(function(d){
    if(!d||!d.ok)throw new Error('change failed');
    _mustChange=false;
    _closeResetPasscode();
    // Toast-style success — reuse error banner positioning, green colour.
    var t=document.createElement('div');
    t.textContent='✅ Passcode updated.';
    t.style.cssText='position:fixed;top:20px;left:50%;transform:translateX(-50%);background:var(--teal);color:#07111F;padding:10px 18px;border-radius:8px;font-weight:700;font-size:13px;z-index:9999;box-shadow:0 4px 16px rgba(0,0,0,.4);';
    document.body.appendChild(t);
    setTimeout(function(){t.remove();},2500);
    if(_state)render(_state);
  }).catch(function(e){
    var msg=(e&&e.serverMessage)?e.serverMessage:'Could not save passcode';
    if(errEl)errEl.textContent='⚠ '+msg;
    if(btn){btn.disabled=false;btn.textContent='Save Passcode';}
  });
}

  var memberNames=Object.keys(members).sort();

      {id:"match-centre",label:"Match Centre \uD83C\uDFAF"},

      {id:"next",label:"Next Week \u270F\uFE0F"},

    else if(_activeTab==="next")         html+=_buildNextWeekCard();
    else if(_activeTab==="leaderboard")  html+=_buildLeaderboardCard(_leaderboard);
    else if(_activeTab==="match-centre") html+=typeof _buildMatchCentreTab==='function'?_buildMatchCentreTab():'<div id="match-centre-tab" class="card" style="display:none"></div>';
    else if(_activeTab==="members")      html+=_buildMembersCard(memberNames);
    else if(_activeTab==="admin")        {html+=_buildAdminTab();html+=_buildDevTools();}
  }
  html+='</div>';
  $app.innerHTML=html;
  if(_activeTab==="next"&&_preserveSearchFocus){
    var inp=document.getElementById("picker-search-input");
    if(inp){inp.focus();try{inp.selectionStart=inp.selectionEnd=_preserveSearchPos;}catch(e){}}
  }
}

function renderLeaderboard(lb){_leaderboard=lb;if(_state&&(_activeTab==="leaderboard"||!_username))render(_state);}
function setPlayers(pl){if(!pl)return;_players=pl;if(_state)render(_state);}

// ─── BOOTSTRAP ────────────────────────────────────────────────────────────────
function _bootstrap(){
  var savedUser=getSavedUsername();
  var stP=fetch("/api/state",{headers:{"Accept":"application/json"}}).then(function(r){if(!r.ok)throw new Error("HTTP "+r.status);return r.json();});
  var hP=(savedUser&&window.IplApi)?window.IplApi.getHistory(savedUser).catch(function(){return null;}):Promise.resolve(null);
  var plP=(!_players&&window.IplApi)?window.IplApi.getPlayers().catch(function(){return null;}):Promise.resolve(null);
  var lbP=fetch("/api/leaderboard",{headers:{"Accept":"application/json"}}).then(function(r){return r.ok?r.json():null;}).catch(function(){return null;});
  var wkP=fetch("/api/current-week",{headers:{"Accept":"application/json"}}).then(function(r){return r.ok?r.json():null;}).catch(function(){return null;});
  stP.then(function(state){
    if(!_username){
      var savedTok=(window.IplAuth&&window.IplAuth.getToken)?window.IplAuth.getToken():null;
      if(savedUser&&savedTok&&state.members&&state.members[savedUser]&&window.IplApi){
        // Validate the token against the server before trusting localStorage.
        // 401 inside _fetchJson auto-clears the token; we then drop to login.
        window.IplApi.whoami().then(function(d){
          if(d&&d.ok&&d.name===savedUser){
            _establishSession(d.name,d.is_admin,d.must_change);
          } else {
            clearUsername();render(state);
          }
        }).catch(function(){
          clearUsername();render(state);
        });
        return;  // skip render \u2014 _establishSession or the catch will render.
      } else if(savedUser){
        clearUsername();
      }
    }
    render(state);
  }).catch(function(err){
    console.error("[IPL] bootstrap:",err);
    showErrorBanner("Could not reach server \u2014 retrying\u2026");
  });
  Promise.all([stP,hP]).then(function(results){
    var state=results[0],history=results[1];
    if(!state)return;
    if(history&&history.ok){
      _historyData=history;_currentWeek=history.current_week;
      if(_nwDraft.team.length===0){
        var cur=_getCurrentWeekRow(history);
        if(cur){var nw=cur.next_week,tw=cur.this_week;if(nw&&nw.team&&nw.team.length>0)_nwDraft={team:nw.team.slice(),cap:nw.cap,vc:nw.vc};else if(tw&&tw.team&&tw.team.length>0)_nwDraft={team:tw.team.slice(),cap:tw.cap,vc:tw.vc};}
      }
    }
    render(state);
  }).catch(function(){});
  plP.then(function(pl){if(pl&&pl.ok!==false){setPlayers(pl);window.dispatchEvent(new CustomEvent("ipl:players-updated",{detail:pl}));}});
  lbP.then(function(lb){if(lb){var norm=window.normaliseLeaderboard?window.normaliseLeaderboard(lb):lb;renderLeaderboard(norm);}});
  wkP.then(function(d){if(d&&d.ok&&d.week_no!==_currentWeek){_currentWeek=d.week_no;if(_state)render(_state);}});
}

var _glueReady=false;
window.addEventListener("ipl:ready",function(){_glueReady=true;_bootstrap();});
setTimeout(function(){if(!_glueReady&&window.IplApi){_glueReady=true;_bootstrap();}},50);

window.addEventListener("ipl:state-updated",function(e){
  var state=e.detail;
  if(!state||typeof state.members!=="object")return;
  if(!_username){var saved=getSavedUsername();if(saved&&state.members[saved])_username=saved;else if(saved&&!state.members[saved])clearUsername();}
  render(state);
});
window.addEventListener("ipl:leaderboard-updated",function(e){renderLeaderboard(e.detail);});
window.addEventListener("ipl:players-updated",function(e){setPlayers(e.detail);});
window.addEventListener("ipl:error",function(e){var err=e.detail;if(err&&err.status&&err.status<500)return;showErrorBanner(err&&err.serverMessage?err.serverMessage:"Server error \u2014 retrying in 60 s\u2026");});
window.addEventListener("ipl:saved",function(){_bootstrap();});
</script>
