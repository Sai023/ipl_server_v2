name: IPL 2026 Daily Sync

on:
  schedule:
    - cron: '0 0 * * *'  # Daily at midnight UTC
  workflow_dispatch:     # Allow manual triggering

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install playwright

      - name: Install Playwright browsers
        run: python -m playwright install --with-deps chromium

      - name: Run daily scraper
        run: python scraper.py
        # GoldenDB (db_manager.py) initialises the schema automatically on
        # first run — no separate DB setup script is required.

      - name: Commit and push updates
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add data/matches/ data/fantasy.db 2>/dev/null || true
          git diff --staged --quiet || git commit -m "Daily sync: $(date +'%Y-%m-%d')"
          git push
