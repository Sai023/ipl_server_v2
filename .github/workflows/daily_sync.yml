name: IPL 2026 Daily Sync

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * *'

jobs:
  sync:
    runs-on: ubuntu-latest
    container:
      image: mcr.microsoft.com/playwright/python:v1.44.0-jammy

    permissions:
      contents: write

    steps:
      - name: 1. Checkout repository
        uses: actions/checkout@v4

      - name: 2. Install Project Dependencies
        run: |
          pip install --upgrade pip
          pip install playwright flask
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: 3. Run Daily Scraper
        run: |
          mkdir -p data/matches
          python scraper.py

      - name: 4. Atomic Data Sync
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add data/fantasy.db data/matches/*.json 2>/dev/null || true
          if ! git diff --staged --quiet; then
            git commit -m "data: sync $(date +%Y-%m-%d)"
            git push origin main
          fi
