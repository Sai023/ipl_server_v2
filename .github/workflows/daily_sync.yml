name: IPL 2026 Daily Sync

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * *'

concurrency:
  group: ipl-sync
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: 1. Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 2. Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 3. Install Core Dependencies
        run: |
          pip install --upgrade pip
          pip install playwright flask
          # Install playwright browsers AND the system-level Linux dependencies
          python -m playwright install chromium --with-deps

      - name: 4. Execution Layer (Master Scraper)
        env:
          # Ensure local modules are resolved correctly
          PYTHONPATH: ${{ github.workspace }}
        run: |
          mkdir -p data/matches
          python scraper.py

      - name: 5. Persistence Layer (Atomic Sync)
        run: |
          # Configure Git to use the standard Action identity
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          
          git add data/
          
          if ! git diff --staged --quiet; then
            git commit -m "data: automated sync $(date +%Y-%m-%d)"
            git push origin main
          else
            echo "Diagnostic: No new data changes detected to push."
          fi
