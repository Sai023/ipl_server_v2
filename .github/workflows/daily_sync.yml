name: IPL 2026 Daily Scrape (cloud safety-net)

# ──────────────────────────────────────────────────────────────────────────────
# What this workflow does (post-refactor, v3.0 — Phase 6)
# ──────────────────────────────────────────────────────────────────────────────
# Architecture
#   Discovery (resolving new Cricbuzz match IDs) runs LOCALLY on the user's
#   Windows box via APScheduler inside server.py — see
#   tasks.start_daily_discovery_scheduler() (v2.0.0). Cricbuzz blocks GitHub
#   Actions egress IPs, so live discovery here would always fail.
#
# This workflow's job is the SCRAPE-and-COMMIT half of the daily cycle:
#   1. Sync data/schedule.json → matches table (idempotent, no Cricbuzz hit)
#   2. Run scraper.py — fetches scorecard JSONs for any newly-completed
#      matches whose cricbuzz_id is already in schedule.json
#   3. Commit data/schedule.json (in case scraper cleared a wrong ID via
#      _reset_url FIX-022), data/matches/*.json, and data/fantasy.db
#
# v3.0 (Phase 6 — Hosted-mode coordination):
#   The hosted server (Render) is ALSO a writer to fantasy.db (user picks,
#   rollover, admin URL changes via /api/* writes wrapped by _push_if_hosted).
#   Coordination strategy:
#     - `concurrency: group: ipl-sync` serializes us with monday_rollover.yml
#       but cannot block the host. So step 7 does pull-rebase + retry.
#     - On unresolvable binary merge conflict (rare), abort with a clear
#       log line. Re-run via workflow_dispatch resolves it.
#     - The conflict window is narrow: ~1s between rebase and push.
#       Friend writes during that window are uncommon (different time zones,
#       bursty Sunday-night pattern) but not impossible.
# ──────────────────────────────────────────────────────────────────────────────

on:
  workflow_dispatch:
    inputs:
      force_full_rescrape:
        description: 'Wipe data/matches/*.json before scraping so every completed match is re-fetched from Cricbuzz. Used by the host site Refresh button.'
        required: false
        default: 'false'
        type: boolean
  schedule:
    # Run at 18:30 UTC (midnight IST) and 21:30 UTC (3am IST).
    # Both fire AFTER the local server's daily 23:55 IST discovery
    # (18:25 UTC), so we pick up the latest schedule.json if the user
    # has pushed.
    - cron: '30 18 * * *'
    - cron: '30 21 * * *'

concurrency:
  group: ipl-sync
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: 1. Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 2. Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 3. Install dependencies
        # APScheduler is in requirements.txt; harmless on Actions (this
        # workflow never starts the scheduler — no server boot here).
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: 4. Seed players (idempotent — no-op if DB already populated)
        run: python Seed_Players.py || echo "Players already seeded or error ignored"
        env:
          PYTHONPATH: ${{ github.workspace }}

      - name: 5. Sync data/schedule.json → matches table
        # --no-live: skip Cricbuzz discovery (Actions IPs blocked).
        # Discovery happens locally via the in-server APScheduler job.
        # schedule.json must already exist in the repo (bootstrapped in file 1).
        # --force is dropped: Seed_Matches.py v4.0's seed_to_db() is idempotent.
        run: python Seed_Matches.py --no-live
        env:
          PYTHONPATH: ${{ github.workspace }}

      - name: 5b. Force-wipe match JSON cache (only when invoked with force_full_rescrape)
        # scraper.py at scraper.py:615 short-circuits on `data/matches/match_NN.json`
        # existing, which means already-scraped matches never get refreshed even
        # if Cricbuzz updated the scorecard (late stats corrections, scoring
        # changes, etc). The host's Refresh button dispatches this workflow with
        # force_full_rescrape=true to force a full re-fetch; the scheduled cron
        # runs leave the cache alone (they're for picking up newly-completed
        # matches and don't need to redo old ones).
        #
        # The host's per-match Save & Scrape commits a deletion of the single
        # match_NN.json before dispatching, so that one match re-scrapes
        # without needing this global wipe.
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.force_full_rescrape == true }}
        run: |
          echo "force_full_rescrape=true: clearing data/matches/*.json"
          rm -f data/matches/*.json
          ls -la data/matches/ || true

      - name: 6. Run Cricbuzz scorecard scraper
        # scraper v11.0 is a pure consumer — reads matches.scorecard_url,
        # fetches scorecards, recalculates points. No discovery attempted.
        # Matches with /00000 URLs (cricbuzz_id still null in schedule.json)
        # are skipped cleanly with a log line; next local discovery fills them.
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: |
          mkdir -p data/matches
          python scraper.py

      - name: 7. Commit & push updated data (re-apply on binary conflict)
        # The hosted server pushes user writes (Save Draft, passcode change,
        # rollover) to fantasy.db at unpredictable times. When that happens
        # during the scrape window, the workflow's local fantasy.db and the
        # remote diverge in *different* tables (host: members/sessions/
        # user_selections; workflow: match_scores/player_match_points/
        # season_pts). Git cannot binary-merge SQLite, so a plain rebase
        # always fails with the conflict you see in screenshot 3 of the
        # 2026-05-17 debugging session.
        #
        # FIX (post-launch): if rebase fails, RESET to origin/main (taking
        # the host's writes), then RE-RUN scraper.py on top. scraper.py is
        # idempotent and uses data/matches/*.json as a cache, so the
        # re-run is fast (~5s) when JSONs are already on disk. We back up
        # the scrape's JSON output to /tmp before each attempt so the
        # reset can restore them via `cp -n` (don't-overwrite-existing).
        # End result: scrape data lands on top of host writes; both
        # preserved.
        run: |
          set -e
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"

          # Back up scraped JSONs BEFORE pushing so we can re-apply on
          # conflict. -n on later cp means "don't overwrite" — host's
          # potentially-newer JSONs win.
          mkdir -p /tmp/scrape-output
          cp -r data/matches/*.json /tmp/scrape-output/ 2>/dev/null || true
          cp data/schedule.json /tmp/scrape-output/ 2>/dev/null || true

          push_attempt() {
            git add -f data/schedule.json  2>/dev/null || true
            git add -f data/matches/*.json 2>/dev/null || true
            git add -f data/fantasy.db     2>/dev/null || true

            if git diff --cached --quiet; then
              echo "Nothing to commit — host already has equivalent state."
              return 0
            fi

            git commit -m "data: scrape $(date -u +%Y-%m-%dT%H:%M)Z"
            git push origin main
          }

          for attempt in 1 2 3; do
            echo "=== Push attempt $attempt ==="
            if push_attempt; then
              echo "::notice::Scrape pushed on attempt $attempt"
              exit 0
            fi

            echo "Push failed (host likely wrote during scrape window)."

            if [ $attempt -eq 3 ]; then
              echo "::error::Could not reconcile with remote after 3 tries."
              echo "::error::Re-running this workflow manually usually resolves it."
              exit 1
            fi

            echo "Re-applying scrape on top of latest origin/main:"
            git fetch origin main --quiet
            git reset --hard origin/main --quiet
            # Restore our scraped JSONs (without overwriting host's newer
            # ones, if any)
            cp -n /tmp/scrape-output/*.json data/matches/ 2>/dev/null || true
            cp -n /tmp/scrape-output/schedule.json data/ 2>/dev/null || true
            # Re-sync the matches table from schedule.json (idempotent)
            python Seed_Matches.py --no-live
            # Re-run scraper — uses cached JSONs so it's fast (~5s)
            python scraper.py
            sleep 2
          done
          echo "::error::Push failed after 3 retries"
          exit 1
