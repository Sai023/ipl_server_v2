name: IPL 2026 Daily Sync

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * *'

jobs:
  sync:
    runs-on: ubuntu-latest
    container:
      # ARCHITECTURAL FIX: Use the official Microsoft Playwright image
      image: ://microsoft.com
      options: --shm-size=2gb

    permissions:
      contents: write

    steps:
      - name: 1. Checkout repository
        uses: actions/checkout@v4

      - name: 2. Install Project Dependencies
        run: |
          # Upgrading pip prevents 'Legacy Install' failures in containers
          pip install --upgrade pip
          pip install playwright flask
          playwright install chromium --with-deps

      - name: 3. Run Master Scraper
        run: |
          # ARCHITECTURAL FIX: Open permissions so the container user can write to 'data'
          mkdir -p data/matches
          chmod -R 777 data
          # Ensure local modules (db_manager.py) are discoverable
          export PYTHONPATH=$PYTHONPATH:.
          python scraper.py

      - name: 4. Atomic Data Sync
        run: |
          # Critical for modern Git to trust the container-mounted directory
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          
          # Stage the 'data' directory (DB + Matches)
          git add data/
          
          if ! git diff --staged --quiet; then
            git commit -m "data: sync $(date +%Y-%m-%d)"
            git push origin main
          else
            echo "No data changes detected. Skipping commit."
          fi
