name: IPL 2026 Daily Sync

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

concurrency:
  group: ipl-sync-${{ github.ref }}
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write

    steps:
      - name: 1. Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 2. Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 3. Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install playwright
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          fi

      - name: 4. Playwright Browser Cache
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          # ARCHITECT FIX: Static key avoids the 'hashFiles' matching error
          key: ${{ runner.os }}-playwright-v1
          restore-keys: |
            ${{ runner.os }}-playwright-

      - name: 5. Install Playwright Chromium
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: python -m playwright install --with-deps chromium

      - name: 6. Run Scraper
        run: |
          mkdir -p data/matches
          python scraper.py

      - name: 7. Atomic Data Sync
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add data/fantasy.db data/matches/*.json 2>/dev/null || true
          if ! git diff --staged --quiet; then
            git commit -m "data: sync $(date +'%Y-%m-%d %H:%M')"
            git push origin main
          else
            echo "No data changes detected."
          fi
