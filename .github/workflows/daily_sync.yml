name: IPL 2026 Daily Sync

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * *'

# Prevent concurrent runs from corrupting the database
concurrency:
  group: ipl-sync
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    container:
      # ARCHITECTURAL FIX: Use the verified Microsoft Container Registry path
      image: ://microsoft.com
      options: --shm-size=2gb

    permissions:
      contents: write

    steps:
      - name: 1. Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 2. Cache Dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/pip
            ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('requirements.txt') }}

      - name: 3. Environment Hardening
        run: |
          pip install --upgrade pip
          pip install playwright flask
          # Install browser binaries only if not cached
          playwright install chromium --with-deps
          # Open permissions for the internal 'data' volume
          mkdir -p data/matches
          chmod -R 777 data

      - name: 4. Execution Layer (Master Scraper)
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: |
          # The v7.0 Engine handles self-healing/seeding internally
          python scraper.py

      - name: 5. Persistence Layer (Atomic Sync)
        run: |
          # Solve 'dubious ownership' in container mounts
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          
          # Stage both database and flat-file JSONs
          git add data/fantasy.db data/matches/*.json 2>/dev/null || true
          
          if ! git diff --staged --quiet; then
            git commit -m "data: IPL 2026 automated sync $(date +%Y-%m-%d)"
            git push origin main
          else
            echo "Infrastructure Check: No new data found to persist."
          fi
