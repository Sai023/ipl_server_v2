name: IPL 2026 Daily Sync

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * *'

concurrency:
  group: ipl-sync
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: 1. Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 2. Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 3. Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: 4. Run Cricbuzz scraper
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: |
          mkdir -p data/matches
          python scraper.py

      - name: 5. Commit & push data
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"

          git add -f data/matches/*.json 2>/dev/null || true
          git add -f data/fantasy.db 2>/dev/null || true

          if [ -n "$(git status --porcelain)" ]; then
            git commit -m "data: sync $(date +%Y-%m-%d)"
            git push origin main
          else
            echo "No changes detected."
          fi
