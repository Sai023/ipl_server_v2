name: IPL 2026 Daily Sync

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * *'

jobs:
  sync:
    runs-on: ubuntu-latest
    container:
      # ARCHITECTURAL FIX: Use the official Microsoft Playwright registry path
      # The previous '://microsoft.com' was an invalid format
      image: ://microsoft.com
      options: --shm-size=2gb

    permissions:
      contents: write

    steps:
      - name: 1. Checkout repository
        uses: actions/checkout@v4

      - name: 2. Install Project Dependencies
        run: |
          pip install --upgrade pip
          pip install playwright flask
          playwright install chromium --with-deps

      - name: 3. Run Master Scraper
        run: |
          # Ensure directory and open permissions for the container user
          mkdir -p data/matches
          chmod -R 777 data
          # Setting PYTHONPATH ensures Seed_Matches.py and db_manager.py are found
          export PYTHONPATH=$PYTHONPATH:.
          python scraper.py

      - name: 4. Atomic Data Sync
        run: |
          # Trust the directory inside the container to prevent git ownership errors
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add data/
          if ! git diff --staged --quiet; then
            git commit -m "data: auto-sync $(date +%Y-%m-%d)"
            git push origin main
          else
            echo "No data changes detected. Skipping commit."
          fi
