name: IPL 2026 Daily Sync

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * *'

jobs:
  sync:
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
      - name: 1. Checkout repository
        uses: actions/checkout@v4
      
      - name: 2. Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 3. Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install playwright
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: 4. Force Browser Dependency Update
        # ARCHITECT FIX: 'apt-get update' fixes the "no installation candidate" error
        run: |
          sudo apt-get update
          python -m playwright install --with-deps chromium

      - name: 5. Run Daily Scraper
        run: |
          mkdir -p data/matches
          python scraper.py

      - name: 6. Atomic Data Sync
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add data/fantasy.db data/matches/*.json 2>/dev/null || true
          if ! git diff --staged --quiet; then
            git commit -m "data: sync $(date +%Y-%m-%d)"
            git push origin main
          fi
