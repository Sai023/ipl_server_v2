name: IPL 2026 Daily Sync

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

concurrency:
  group: ipl-sync-${{ github.ref }}
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write

    steps:
      - name: 1. Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Ensures we have history for a clean push

      - name: 2. Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          # REMOVED: 'cache: pip' is what caused your error. 
          # We will handle dependencies manually for better stability.

      - name: 3. Install Dependencies
        run: |
          python -m pip install --upgrade pip
          # Check for requirements.txt but don't crash if missing
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          else
            pip install playwright
          fi

      - name: 4. Playwright Browser Cache
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-playwright-

      - name: 5. Install Playwright Chromium
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: python -m playwright install --with-deps chromium

      - name: 6. Run Scraper
        run: |
          mkdir -p data/matches
          python scraper.py

      - name: 7. Atomic Data Sync
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          
          # Add only what is necessary
          git add data/fantasy.db data/matches/*.json 2>/dev/null || true
          
          # Only commit and push if data actually changed
          if ! git diff --staged --quiet; then
            git commit -m "data: internal sync $(date +'%Y-%m-%d %H:%M')"
            git push origin main
          else
            echo "No data changes detected. Skipping push."
          fi
